depth_invariance = ["katgpt-types/depth_invariance", "katgpt-micro-belief/depth_invariance", "katgpt-sense/depth_invariance"]  # Depth-Invariance Diagnostic + MagnitudeRegularizedResidual — root-cause counterpart to BeliefRankPruner / GainCostLoopHalter / latent_functor/reestimation / micro_belief/coherence_bench (Plan 306, Research 286, arXiv:2605.09992 Eldenk et al., Attention Drift). Detects DepthSpecificRefinement / Collapsed / DepthInvariant on flattened `&[f32]` state chains. The MagnitudeRegularizedResidual wrapper is the modelless fix for kernels we own (HLA/functor/micro_belief/engram/Raven); for frozen MLPs the fix requires retraining (→ riir-train). NOTE: also propagates to katgpt-micro-belief so AttractorKernel/LeakyIntegrator::audit_depth_invariance (gated `#[cfg(feature="depth_invariance")]` in that crate) become available when micro_belief is enabled — without this, `tests/depth_invariance_micro_belief.rs` fails to compile (E0599, 2026-06-29). Also forwards to katgpt-sense so the reconstruction_depth_invariance audit module resolves. DEFAULT-ON (Plan 306 T7.4, 2026-06-23): G1/G2/G3 PASS (G2 reproduces paper attention-drift on random-init); G4 re-spec'd from structurally-impossible relative gates to absolute-latency at HLA scale (classify_chain 0.54µs ≤1µs at d=1024,k=4; 0.22% ≤5% of forward; apply_magnitude_regularization 1.42µs ≤2µs). SIMD inner-loop via simd::simd_sum_sq_quartic (commit fb2c7c4f). Zero runtime cost unless a caller invokes classify_chain / apply_magnitude_regularization.
karc_forecaster = []  # KARC — Kolmogorov-Arnold Reservoir Computing delay-basis-ridge forecaster (Plan 308, Research 288, arXiv:2606.19984 Huang/Kurths/Tang). Modelless, inference-time trajectory forecaster: delay-embedding × sealed KarcBasis (Fourier/Chebyshev/BSpline) × closed-form ridge readout. Reuses the PEIRA ridge pattern via the new `linalg::ridge_solve` (f32) without touching PEIRA's f64 path. GOAT-gated G1 (double-scroll NRMSE ≤ 1e-3, ≥ 8 LT), G2 (≤ 500 ns/call forecast), G3 (zero-alloc forecast), G4 (bit-reproducible Wout). Opt-in — Phase 1 only; no root-feature alias yet.
cross_resolution_transport = ["funcattn"]  # Cross-Resolution Spectral Transport — asymmetric-basis FUNCATTN (Plan 310, Research 291, arXiv:2605.31559). Generalizes FUNCATTN to `d_src ≠ d_dst`, enabling train-on-small-deploy-on-large latent transfer. Implies `funcattn` for solver/C-operator reuse. DEFAULT-ON (Plan 310 Phase 4, 2026-06-23): G1 mean cos 0.8944≥0.85, G2-A rank preservation mean cos 0.9300≥0.85 (Super-GOAT headline claim holds), G3 elbow at k=intrinsic_k=8, G4 0 allocs/1000 transports. Promoted per AGENTS.md rule 'GOAT pass → promote to default'.
latent_field_steering = []  # Latent Field Steering — top-down direction-vector injection into mutable latent state (Plan 309, Research 290, CAA + functional emotions). Zero-alloc SIMD SAXPY + sigmoid-falloff localized support (radius/zone). DEFAULT-ON (Plan 309 Phase 4, 2026-06-23): G1-G5 all PASS — G1 fear-axis 1.50×≥1.30, G2 mean cos 0.9958≥0.95 min cos 0.9667≥0.90, G3 leakage 4.5e-5<0.01, G4 19.2µs<1ms, G5 0 allocs. Caveat: 8% argmax flip at α=0.3 — keep α≤0.3 for hot-path.
phase_rotation_coupling = []  # Phase-Modulated Subspace Rotation Gate — norm-preserving latent coupling `cos α ⊙ a + sin α ⊙ b` with phase from a sigmoid projection onto a frozen direction vector (Plan 322, Research 305, arxiv 2605.12700 UFO). The genuinely-new operation class: every other latent op in the crate is additive / convex-combo / dot-projection / wedge-detection / linear-transport / spatial-sum — none has the `sin²α+cos²α=1` Pythagorean norm-preservation invariant. §3.5 modelless Path 2 unblock: trained γ_θ replaced with `α = sigmoid(⟨state, direction⟩ · λ) · π/2` (closed-form). Opt-in until G1–G4 GOAT gate passes (G1 norm-preservation <1e-4 is the kill switch; G2 monotone interpolation; G3 latency <50ns D=8 scalar / <600ns D=64 per-channel; G4 zero-alloc).
bisimulation_operator_inference = []  # Bisimulation Operator Inference — generic modelless primitive that quotients an observed transition graph into bisimulation-equivalent state classes and infers an abstract PDDL-like operator schema (Plan 324, Research 308, arXiv:2602.19260 "The Price Is Not Right" Duggan et al. Feb 2026; underlying NSM method arXiv:2508.21501 Lorang et al.). Closes Research 264 §2.2 gap #1 (PTG data structure) + #2 (motif-mining loop). Lighter-weight PDDL-side counterpart to Induced CWM (Plan 296). Opt-in by design — downstream pipelines opt in; the primitive is not a default-on capability. Paige-Tarjan O((S+E) log S) partition refinement, canonical BLAKE3 commitment, BFS planner.
arg_protocol = ["dep:papaya"]  # ARG Protocol Primitives — PolicyEnvelope + TaxonomyValidator + LifecycleState+RedirectTable + TypedOfflineCandidate+OfflineCandidateScorer + InfoRegistry (Plan 327 Phases 1-4, Research 309 — open half of the ARG × Latent Substrate Super-GOAT fusion). Five generic protocol primitives distilled from the ARG Standard (protocol.airistech.ai/arg-core.html). No game/chain/shard semantics. DEFAULT-ON (Plan 327 Phase 4, 2026-06-25): G1-G5 all PASS, pure modelless gain. Private runtime composition lives in riir-ai Plan 337 / Guide 160.
babel_codec = []  # BabelCodec — Readability-relaxed semantic codec (Plan 331, Research 312, arXiv:2606.19857 BabelTele). Open primitive: generic `BabelCodec` trait + `FixedRuleTextCodec` (deterministic BT-P8 fixed symbolic mapping rules for KG-triple / entity-attribute / config / quest-grammar surfaces) + `SigmoidLatentCodec<D>` (generic-trait facade over existing `DensityBudget` infrastructure, latent-level analog) + BLAKE3 commitment. The modelless subset of BabelTele (the paper's headline 3.6× is LLM-prompted, NOT deterministic; we ship the fixed-rule subset). Opt-in until G1–G5 GOAT gate passes — the same G2 (≥ 2× on real corpus) gate that killed CompressionDrafter twice (Plan 285/287). Sigmoid, not softmax (per AGENTS.md).
analytic_lattice = []  # Analytic Lattice — k×k transport operator chain composer + ASOC trait shapes + direction-vector SIMD decoder + spectral audit (Plan 330, Research 311, fusion of Functional Attention × PJ-RoPE × Gyrocalculus). katgpt-core half: pure math primitives (compose_chain, batch_compose_chain, direction_vector_decode, spectral_audit) + generic trait shapes (PlasmaDraft, RederiveOp, ComposerCtx) — NO GpuFuture import (leaf-clean). The ComposerTick: GpuFuture impl + Join3 combinator ship in riir-engine under the `analytic_lattice_runtime` feature (Phase 1b — separate task). Opt-in until G1–G6 GOAT gate passes. Flag name renamed from `analytic_lattice_encoder` per the revision note — the original `AnalyticLatticeEncoder` trait is DROPPED (redundant with riir-engine/src/fourier/encoder.rs).
sleep_time_anticipation = ["dep:katgpt-sleep"]  # Sleep-Time Query Anticipator — open primitive for offline query anticipation (Plan 334, Research 318, arXiv:2504.13171 Lin et al. Letta/Berkeley). Substrate lives in the katgpt-sleep crate (Issue 007 Phase E Tier 2 #6); this feature turns on the re-export. SleepTimeAnticipator orchestrates per-direction sleep-time compute → emits reusable AnticipatedQuerySet (c' artifact, BLAKE3-committed) → wake-time consume() does cheap dot-product + sigmoid-gated lookup, falling through to fresh compute on low-predictability queries. PredictabilityScorer trait + DotPredictabilityScorer default (p = sigmoid(α·dot(c,dir)+β)); AmortizationCostModel operationalizes the paper's §5.3 cost model (sleep_cost + N·t·b_max·(1−E[gate])). Phase 1 ships traits + types + IdentityFunctorOp (synthetic-test default, z_i = c + dir_i). Game-specific direction-vector catalogs, NPC tiering, HLA wiring, chain commitment live in riir-ai Plan 341 (private). Opt-in until G1–G5 GOAT gate passes; promotion to default-on requires Plan 341 G1–G5 to clear on a real game corpus. Sigmoid, not softmax (per AGENTS.md).
paired_loss_diagnostic = []  # Paired Token-Level Loss Gap Diagnostic — generic modelless A/B measurement primitive (Plan 335, Research 319, arXiv:2606.20936 Li & Merrill AI2). PairedLossGap computes per-token Δ_i = ℓ_A − ℓ_B from two log-prob traces; tag-stratified means (Content/Function/Other/BracketOpen/BracketClose/CopyN); filtered aggregates (ALL_TOKENS / TOP-K∩NO-COPY / COPY-N-ONLY) that amplify small architecture gaps aggregate loss hides (paper §6 shows ~2× separation on Olmo 1B). ClassSizeBound exposes Proposition 1 (DKL(p⋆_τ ‖ p_ϕ,τ) ≤ log|V_τ|) — the volume-of-support bound justifying raw-vs-latent sync (physical small V_τ → raw sufficient; semantic large V_τ → latent earns its keep). Pure measurement tool, NOT an inference mechanism (Research 319 §3: not Super-GOAT). Generic math, no game/chain/shard semantics — legitimately public. Opt-in until G1 (synthetic fixture) + G2 (<1µs L=8192 zero-alloc) + G3 (no-regression) + G4 (filter amplifies gap ≥1.5× on micro-GPT A/B) GOAT gate passes.
temp_loss_fingerprint = []  # TEMP — Perturbed-Loss-Vector Diversity Fingerprint (Plan 341, Research 323, arXiv:2606.26797 Jin et al. ICML 2026). Modelless diversity selector: given two committed snapshots S_0, S_1, extrapolate K checkpoints along v = S_1 − S_0, compute per-candidate short-prefix loss vectors, and select the K-subset with maximal Lipschitz-bound spread — gradient-diversity ranking without gradients. Theorem 3.1 modelless reframe: similar loss vectors across K extrapolated checkpoints ⇒ similar gradients along v during the next weight-mutation cycle. Composes with ac_prefix::ConditionalLogprob, HLA surprise, RavenSlotLossKernel (riir-neuron-db Plan 005). DEFAULT-ON (Plan 341 Phase 2, 2026-06-29): G1 15.44x>=2x (MIN pairwise bound metric, Gaussian mixture fixture), G2 Kendall tau 0.9839>=0.85 at N=32 vs N=256 (paper Fig. 6 modelless analog), G3 perturbed_loss_vector 2.46us<5us + select_diverse_subset 130us<1ms + 0 allocs hot path, G4 bit-identical determinism, G5 134/134 each-feature clean. riir-neuron-db Plan 005 G2' integration gain +0.1672 (modelless). 673/673 tests pass.

