linking_fold_fold = []  # Linking-Fold hot-path correction ONLY (Plan 410, Research 391, arXiv:2606.31856 Ren & Lim ICML 2026). Coordinate-wise |x−c| fold (paper Eq. 1: |x|=x+2·ReLU(−x)) as the deterministic modelless unlinking correction — `fold_projection_into` / `fold_gelu_into`. Closes a gap the codebase has implicitly: every sigmoid projection (HLA scalars, direction-vector projections, ItemEmbedIndex cosine retrieval) is monotonic → provably cannot linearly separate linked manifolds (paper Thm 4.7). DEFAULT-ON (Plan 410 T4.4 Option C, 2026-07-07): the fold passes every GOAT gate modellessly — G1 ✅ (fold unlinks Hopf link), G2 ✅ (12.5ns@D=8 Abs / 16.1ns@D=8 Gelu / 16.8ns@D=64 Abs / 16.9ns@D=64 Gelu, all under 50ns/500ns budgets), G3 ✅, G4 ✅ (0 allocs/1000 calls × 4), G5 ✅ (bit-identical). Hot-path, zero-alloc, #[inline], pure stdlib. Zero runtime cost unless invoked.
linking_fold_detector = []  # Linking-Number Detector cold-path ONLY (Plan 410, Research 391, arXiv:2606.31856 Ren & Lim ICML 2026). Algorithm 1 (PCA-3D + ε-kNN + fundamental cycle basis via BFS spanning forest + Gauss linking integral) detects whether two point clouds are topologically linked (link≠0). OPT-IN (Issue 050 unresolved): the detector FAILS its original G2 budget (50ms@n=2×1000 — the brute-force O(β²) implementation measures 407ms@n=2×200 and extrapolates to minutes@n=2×1000). It PASSES a recalibrated 500ms@n=2×200 audit-cadence budget. Audit-cadence (per sleep-cycle, not per-tick); may allocate. Promote `linking_fold_fold` (the correction) is default-on; this detector sub-feature stays opt-in until Issue 050 resolves (accept budget / optimize / keep split).
ssmax_temperature = []  # SSMax — length-aware log-N attention temperature (Plan 411, Research 392, arxiv 2607.01538 Gollapudi et al. *Drowning in Documents at Million Token Scale*). Multiplicative pre-attention logit rescaling `s̃ = s_L · log(N) · s` that cancels the (N−1) denominator growth in the attention dilution bound `α_gold ≈ 1 / (1 + (N−1) · N^{−s·Δ})`. Default `s_L = 1.0` is truly modelless (zero training, zero new params); an optional rolling-Δ estimator gives a runtime-adaptive `s_L ≈ 1/Δ_typical`. Composes with sigmoid parallax (`parallax_attn`) and standard SDPA (`attention`); does NOT apply to `funcattn` (Research 261 closed negative: basis-mode has no (n,n) matrix → no dilution). DEFAULT-ON (Plan 411 Phase 5, 2026-07-07): G1+G2+G3+G4+G5 ALL PASS. Zero runtime cost unless invoked (ParallaxConfig.ssmax defaults None; apply_ssmax_to_row is a no-op when None; ssmax_none_is_bit_identical_to_base test verifies zero default-behavior change).
ssmax_adaptive = ["ssmax_temperature"]  # SSMax built-in rolling-Δ estimator (Plan 411 S2). `RollingDeltaEstimator` — lock-free EMA (`AtomicU64` CAS loop) of the `max(logits) − mean(logits)` proxy for the gold-distractor gap Δ. Produces `SsmaxMode::Adaptive` on demand via `to_mode()`. Warm-start Δ=1.0 → s_L=1.0 (matches Fixed default). Opt-in until S2 GOAT gate (G1 convergence, G2 retrieval parity vs analytical, G3 latency, G4 alloc-free, G5 no-regression) passes. Zero runtime cost unless a caller constructs `RollingDeltaEstimator`.
gold_share_probe = []  # GoldShare — content-specific output-fraction diagnostic `‖a^G_L‖ / ‖a_L‖` (Plan 411, Research 392, arxiv 2607.01538 Gollapudi et al.). Decomposes a layer's attention output into gold-derived vs distractor-derived fractions; detects when output has been rewritten from gold-content to aggregate-noise at comparable magnitude (paper Table 1: `‖a_L‖` shrinks ~36% while gold-share collapses 130× across N ∈ {500→10k}). Complements `effective_rank` (content-agnostic aggregate) and `stable_rank_update` (per-sink degeneracy). Standalone norm computation — leaf, no deps (data_probe/mod.rs is always-on; gold_share does not use geometry.rs which is the sink_aware_attn-gated part). Opt-in diagnostic.
channel_simd_align = []  # Channel SIMD Alignment — cache-line-padded weight storage (Plan 227 Phase 5).
