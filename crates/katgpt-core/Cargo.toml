[package]
name = "katgpt-core"
version = "0.2.0"
edition = "2024"
license = "MIT"
description = "Shared types and SIMD kernels for katgpt-rs and riir-engine"
repository = "https://github.com/katopz/katgpt-rs"
readme = "README.md"
keywords = ["inference", "simd", "modelless", "attention", "manifold"]
categories = ["algorithms", "science", "data-structures"]

[dependencies]
fastrand = "2"
rayon = "1.10"
log = "0.4"
blake3 = "1"
serde = { version = "1", features = ["derive"] }
postcard = { version = "1", features = ["alloc"] }
half = "2"
bytemuck = { version = "1", features = ["derive"] }
# Stack-allocated Vec for MCTSNode children/unexpanded (Plan 008 Phase 2.6):
# eliminates per-node heap allocation. Capacity bounded by MAX_UNEXPANDED=16
# (covers Bomber=6, Grid=5, Raid=~9 branching factors with headroom).
arrayvec = "0.7"
papaya = { version = "0.2", optional = true }
rustfft = { version = "6", optional = true }
lz4_flex = { version = "0.13", optional = true }
# ahash is used by `closure_instrument` (Plan 290 G1 hot-path optimization).
# Already a transitive dep via hashbrown 0.14 / bevy_utils — listing it here only
# promotes it to a direct dependency for the `closure_instrument` feature.
ahash = { version = "0.8", optional = true }
# katgpt-dec houses the Discrete Exterior Calculus substrate spun out of
# katgpt-core::dec (Issue 007 Phase E Tier 1). Optional — pulled in by the
# `dec_operators` feature and re-exported as `katgpt_core::dec` for backwards
# compatibility.
katgpt-dec = { path = "../katgpt-dec", optional = true }
# katgpt-types houses the shared types + SIMD substrate spun out of
# katgpt-core::{types, simd} (Issue 007 Phase E Tier 1 #2). Always-on — the
# types/simd modules are foundational substrate that every other katgpt-core
# module consumes. Re-exported as `katgpt_core::types` and `katgpt_core::simd`
# for backwards compatibility.
katgpt-types = { path = "../katgpt-types" }
# katgpt-micro-belief houses the micro-recurrent belief-state kernel spun out
# of katgpt-core::micro_belief (Issue 007 Phase E Tier 1 #3). Optional — pulled
# in by the `micro_belief` feature and re-exported as `katgpt_core::micro_belief`
# for backwards compatibility.
katgpt-micro-belief = { path = "../katgpt-micro-belief", optional = true }
# katgpt-hla houses the Higher-order Linear Attention substrate (cache types +
# streaming kernels) AND the composition layer (forward_hla / forward_ahla,
# Issue 007 Phase F.4b) spun out of katgpt-core::hla. Always-on — re-exported
# as `katgpt_core::hla` for backwards compatibility. The composition layer
# moved from root `src/hla/forward.rs` into katgpt-hla now that ForwardContext
# lives in katgpt-forward.
katgpt-hla = { path = "../katgpt-hla" }
# katgpt-personality houses the Personality-Weighted Latent Layer Composition
# substrate (sigmoid + kernel + snapshot + types) spun out of
# katgpt-core::personality_composition (Issue 007 Phase E Tier 2 #5). Optional
# — pulled in by the `personality_composition` feature and re-exported as
# `katgpt_core::personality_composition` for backwards compatibility.
katgpt-personality = { path = "../katgpt-personality", optional = true }
# katgpt-sleep houses the Sleep-Time Query Anticipator substrate (anticipator
# + consume + cost_model + predictability + types) spun out of
# katgpt-core::sleep_time (Issue 007 Phase E Tier 2 #6). Optional — pulled in
# by the `sleep_time_anticipation` feature and re-exported as
# `katgpt_core::sleep_time` for backwards compatibility.
katgpt-sleep = { path = "../katgpt-sleep", optional = true }
# katgpt-sense houses the KG Latent Octree Sense substrate (octree,
# reconstruction, bake, lod, schema_centroid, sector, serialize) spun out of
# katgpt-core::sense (Issue 007 Phase E Tier 2 #7, Plan 338). Optional —
# pulled in by the `sense_composition` feature and re-exported as
# `katgpt_core::sense::*` for backwards compatibility. `spectral_threat`
# stays local in katgpt-core (depends on `linoss`) and is re-exported through
# the `sense::spectral_threat` shim path.
katgpt-sense = { path = "../katgpt-sense", optional = true }
# Plan 299 T4.3: tokenizer compression (NFKC + lowercase collapse) for the
# `engram` feature. Small dep, only compiled when `engram` is on.
unicode-normalization = { version = "0.1", optional = true }

[dev-dependencies]
serde_json = "1"
# Phase 10 (2026-07-04): trigger_gate's from_toml/to_toml are test-only.
toml = "0.8"
# Plan 388 Phase 1: freeze module's save/load roundtrip tests.
tempfile = "3"
# Used by the Plan 323 Fourier-continuation GOAT bench (G1 FFT-based Gibbs
# suppression test). Already a normal optional dep; listed here so the bench
# target can use it without enabling an unrelated feature.
rustfft = "6"
# criterion pulls rayon, which has no wasm32 backend. Benches run on native
# only; gate accordingly so wasm32 example builds (Issue 007 GOAT harness)
# don't unify it in.
[target.'cfg(not(target_arch = "wasm32"))'.dev-dependencies]
criterion = { version = "0.5", features = ["html_reports"] }
# proptest pulls rusty-fork → wait-timeout, which has no wasm32 backend.
# Property tests (Plan 299 T1.7) run on native only; gate accordingly so
# wasm32 example/bench builds (Issue 007 GOAT harness) don't unify it in.
proptest = "1"  # Plan 299 T1.7 — multi_head_hash property tests (determinism + uniform distribution)
# statrs test-only reference for best_belief G1 GOAT gate (Plan 336 T2.1).
# Native-only — pulls deps that don't wasm-build.
statrs = "0.17"

[features]
default = ["sparse_mlp", "plasma_path", "leo_all_goals", "dual_leo", "sigmoid_margin", "spectral_hierarchy", "dual_gram_pca", "roofline_cost", "octree_ctc", "sector_projection", "action_bridge", "triggered_injection", "temporal_deriv", "bom_sampling", "personality_composition", "depth_invariance", "cross_resolution_transport", "latent_field_steering", "viable_manifold_graph", "ac_prefix", "geometric_product", "fourier_continuation", "spectral_differentiation", "tucker_factorization", "arg_protocol", "indicator_probe_bank", "indicator_similarity", "phase_rotation_coupling", "spherical_steering", "closure_instrument", "non_interference_branches", "funcattn_structured_basis", "best_belief", "committed_field_blend", "tropical_algebra", "temp_loss_fingerprint", "zone_density_routing", "set_attention", "manifold_bandit", "mean_field_regime", "qmc_sampling", "velocity_field_ensemble", "cognitive_architecture_root", "ptg_functor_edges", "local_branch_routing", "ane_roofline", "cce_moderator", "llmexec_guard", "ssd_block", "salience_tri_gate", "renoise_ce", "product_key_memory", "linking_fold_fold", "ssmax_temperature", "subspace_steering", "region_subspace_steering"]  # Phase 15 (2026-07-09): +region_subspace_steering (Plan 416 Phase 4 GOAT G1+G2+G3+G4+G5 ALL PASS). The region-conditioned generalization of Plan 412: K regions, each with a centroid + local R-dim factor-analyzer subspace. Two-mode steering (centroid interpolation + local offset) + per-region sigmoid membership gates (reformulated from softmax per AGENTS.md). At degenerate K=1,mu=0,W=I bit-identical to Plan 412 (0 mismatches / 800 comparisons). Pure modelless (closed-form: sigmoid + SAXPY + RxR Gauss-Jordan inverse). Coexists with Plan 412. See tests/bench_416_region_subspace_goat.rs.  # Phase 14 (2026-07-08): +subspace_steering (Plan 412 Phase 5 GOAT G1+G3+G4+G5 ALL PASS). The k-dim generalization of Plan 309 LatentSteeringVector. At K=1 bit-identical (0 mismatches / 800 comparisons); at K>=2 manifold walking. Pure modelless (SAXPY + Gram-Schmidt). Phase 3 finding: Newton-Schulz DIVERGES on non-square K<D -> Gram-Schmidt. Zero runtime cost unless constructed. Coexists with Plan 309.  # Phase 13 (2026-07-07): +ssmax_temperature (Plan 411 Phase 5 GOAT G1+G2+G3+G4+G5 ALL PASS). Pure modelless (closed-form s_L.log(N).s rescale). Zero runtime cost unless invoked (ParallaxConfig.ssmax defaults None; ssmax_none_is_bit_identical_to_base test verifies zero default-behavior change). See .benchmarks/411_ssmax_goldshare_goat.md.  # Phase 11 (2026-07-07): +product_key_memory.  # Phase 12 (2026-07-07): +linking_fold_fold (Plan 410 T4.4 Option C: hot-path fold ships default-on; cold-path detector stays opt-in as linking_fold_detector).  # product_key_memory DEFAULT-ON (Plan 408 Phase 3 GOAT, 2026-07-07): G1 latency 1670× speedup (PKM p50 17.5µs vs O(N) brute-force p50 29.2ms at SQRT_N=1000/N=10⁶ slots, D_K=64, K=8; target ≥100×), G2 top-k Jaccard 1.0000 vs brute-force (50 queries; Phase 2 unit test 1000-query mean Jaccard ≥0.95), G3 IDW centroid-ness PASS (Dot intra-cluster rate 0.000 vs IDW 1.000 — IDW attracts to near low-magnitude cluster, Dot distracted by high-magnitude clusters), G4 0 allocs/1000 steady-state query_into calls (CountingAllocator). Pure modelless (FwPKM's GD half forbidden per constraint #1, replaced by shipped δ-rule Plan 053). Retrieval stack: Raven O(1) / Engram O(1)-hash / δ-Mem O(r) / PKM O(√N) — four distinct complexity classes. See .benchmarks/408_pkm_goat.md. Zero runtime cost unless a caller constructs ProductKeyMemory.  # Phase 10 (2026-07-04): +cce_moderator/llmexec_guard/ssd_block/salience_tri_gate.  # ane_roofline DEFAULT-ON (Plan 379 Phase 2 GOAT, 2026-07-04): G1-G5 all PASS -- G1 5/5 routing verdicts match Bryngelson ch.11 + cross-chip + family roundtrip, G2 <1us, G2-alloc 0, G4 struct sizes 48/40/32B. Pure modelless. Zero runtime cost unless invoked.  # local_branch_routing DEFAULT-ON (Plan 377 Phase 3, 2026-07-04): G1 22/22 unit tests, G2 route_argmax 51.1ns + route_sampled 69.1ns at K=3 D=64 (<1µs target, 14-20× headroom), G3 K=1 bit-identical, G4 0 allocs/100 calls (construction = 1 one-time Box<[f32]>), G5 modelless ([] deps), G6 sigmoid-not-softmax (Logistic(0, β) noise has CDF sigmoid(x/β); no exp in sampling path). PoC +9pp to +26pp quality gain across 5 noise cells. Set-attention variant adds zero modelless value (±1pp) → riir-train follow-up.  # ptg_functor_edges DEFAULT-ON (Issue 040, 2026-07-04): G1 correctness 6/6 sub-checks (high-coherence ≈ state+dir, low-coherence ≈ identity, determinism, threshold gate=0.5, FunctorPtg preserves inner commitment, wire-format byte-identical), G2 apply_functor_edge_into 28.5ns at D=64 (target <200ns, 7× headroom), G2-alloc 0 allocs/1000 calls, G3 default + --all-features + --no-default clean, G4 size_of::<FunctorEdgeParams>==44 bytes (no heap indirection), G5/G6 pure modelless (closed-form cosine + sigmoid + SAXPY). Wire-format safe: FunctorPtg composite leaves PtgEdge unchanged — T1 audit found postcard #[serde(default)] does NOT work for missing trailing fields ("Hit end of buffer"), so the composite approach is mandatory. 17 unit tests.  # cognitive_architecture_root DEFAULT-ON (Issue 039, 2026-07-04): G1 spec-match 13/13 + bit-flip every input; G1-avalanche min 120/256 avg 126/256 (BLAKE3 ~128, floor 96); G2 from_parts 208ns + verify 208ns (<500ns); G2-alloc 0/1000; G3 --all-features + --no-default clean; G4 size_of==32. Pure modelless. velocity_field_ensemble DEFAULT-ON (Plan 376 Phase 3, 2026-07-04): G1 mechanics 9/9 (η recovery <1e-4), G2 cross-domain 3/3 metrics (3.5× MSE reduction over single-best in related-sources regime; honest PoC with unrelated-sources null), G3 0 allocs + all-features/no-default clean, G4 fit_into 6.27µs<50µs + eval_into 21ns<200ns + eval_batch(1000) 20µs<5ms. Pure modelless (closed-form ridge_solve_direct_f32, same P×P Cholesky as KARC; no training, no softmax). Includes optimal-diffusion SDE integrator (paper Algorithm 1) as decoupled utility.  # qmc_sampling DEFAULT-ON (Plan 367 Phase 5, 2026-07-03): G1 chi-square marginal exactness PASS all 3 sources (Lattice 1.17%, Stratified 0.78%, Sobol 0.39% fail rate vs i.i.d. 0.39%, alpha=0.01), G2 pass@k Lattice 50% sample reduction (K_qmc=8 vs K_iid=16 at pass@k>=0.5, target <=0.75; Stratified/Sobol optimized for RL-variance/multi-dim respectively), G3 K=1 bit-identical to i.i.d. (0/10000 mismatches), G4 0 allocs/100 calls, G5 per-rollout 25-34ns (target <1000ns), G6 all-features/no-default clean. Phase 5 GOAT bench caught and fixed critical Sobol scramble bug (OR-of-two-halves -> single upper-32-bits). Pure modelless.  # mean_field_regime DEFAULT-ON (Plan 371 Phase 6, 2026-07-03): G1 25/25 (100%) + 4/4 distinct regimes, G2 9.79us<15us + 0ns hopf/classify, G3 710/710 feature+682/682 default clean, G4 0 allocs, G5 bit-identical. Pure modelless. Fine-grid (17pt beta=1.4 col): 14/17, 3 pre-existing NSO<->IS at neg G_eff (Issue 034 T4).  # manifold_bandit DEFAULT-ON (Plan 370 Phase 2, 2026-07-03): G1 ratio 0.723<=0.8, G3 ratio 0.350<=0.5, G4 sample 408ns/observe 26ns/0 allocs, G5 bit-reproducible. G2 FAIL is plan-level expectation error (diversity is curriculum-learning-specific). Modelless unblock: EVIDENCE replaces SUM.  # set_attention DEFAULT-ON (Plan 354 Phase 2 + Plan 355 G6/G7/G9, 2026-07-01): G1 permutation equivariance bit-exact (1e-6 tol), G2 identity-floor meaningfulness on 2-cluster, G3 latency 21.96us at N=64 (2200x headroom under 50ms tick), G4 0 allocs/100 calls, G5 sigmoid-not-softmax lonely-query correctness. riir-ai runtime G6 fusion cosine sim <0.95 (fusion adds value over identity), G7 crowd stability <5% drift over 100x2000 ticks, G9 production latency 75.7us mean/tick at 100 NPCs (6.6x headroom under 500us gate). G8 collective inference FAILED (Super-GOAT->GOAT) -- averaging cannot amplify detection; use-case limitation, NOT a primitive defect. Validated selling point: crowd coherence (belief sync, noise reduction, contextual awareness). Pure modelless (closed-form sigmoid gates, no training).  # zone_density_routing DEFAULT-ON (Plan 351 Phase 3, 2026-06-29): G5a +19.4% entropy, G5b 99.1% compute saved, G5c 0 stale reads. Modelless.  # temp_loss_fingerprint DEFAULT-ON (Plan 341 Phase 2, 2026-06-29): G1 bound preservation 15.44x>=2x (Gaussian mixture fixture, MIN pairwise bound metric = greedy max-min objective), G2 prefix sweep Kendall tau 0.9839>=0.85 at N=32 vs N=256 (paper Fig. 6 modelless analog), G3 perturbed_loss_vector 2.46us<5us + select_diverse_subset 130us<1ms + 0 allocs hot path, G4 bit-identical determinism, G5 134/134 each-feature clean. riir-neuron-db Plan 005 G2' integration gain +0.1672 (modelless). 673/673 tests pass.  # tropical_algebra DEFAULT-ON (Plan 337 Phase 3, 2026-06-28): G1 non-redundancy 3/3 PASS (S1 DEC cochain top-3 sym-diff=2, S2 HLA pairs rho=+0.3468, S3 path rho=+0.6991) -> Super-GOAT quality tier. G2 perf PASS at gate dims after NEON specialization (T3.4): D=64 0.96x, D=128 1.03x vs simd_matvec (D=8 0.82x, noted caveat — HLA use case is sparse DEC wrappers not dense 8x8 matvec). G3 clean, G4 0 allocs, G5 pure modelless (max +). Result noisy at D=64 boundary (0.80-0.96x across runs); D=128 solidly ~1.0x. riir-ai/.research/164 guide.  # committed_field_blend DEFAULT-ON (2026-06-28, Issue 005 executed): Plan 321 G1–G5 + riir-ai Plan 336 G6a–G6e + G7a ALL PASS. FAME sampling-invariant per-entity MoE. Modelless (closed-form sigmoid projection + BLAKE3 commit). Implies personality_composition (already default). G2 sampling-invariance worst-case Δpi=1.19e-6/100 entities; G4 zero-alloc apply+commit; G6d median 0.177ms ≤ 10ms (56× headroom); G7a frozen-restoration bit-identical. Zero runtime cost unless a caller invokes commit/apply_blended.  # non_interference_branches DEFAULT-ON (Plan 329 Phase 3, 2026-06-26): G1 8 orthogonal directions in D=8 (pairwise interference 0.00e0<1e-6; write to b_i does not contaminate b_j stores; 9th direction interferes 0.3536>=1/sqrt(8)=0.3536), G2 route 301.5ns<1us (64-branch bank, 3.3x margin), G3 all clean, G4 0 allocs/100 calls, G5 [] deps. 101/101 tests.  # closure_instrument DEFAULT-ON (Plan 290 T4.7 + G4 fix, 2026-06-26): G1 67us<100us (bit matrix, Issue 035), G2 638us<5ms, G3 synthetic-proxy monotone, G4 0.296MB<1MB (Option<[u8;32]> fix). 55/55 tests green. API break: PtgNode.blake3_in [u8;32] -> Option<[u8;32]>.  # phase_rotation_coupling DEFAULT-ON (Plan 322 Phase 2, 2026-06-25): G1 per-channel Pythagorean drift 5.96e-8<1e-4 + norm bound violation 0<1e-4 + scalar libm drift 1.19e-7, G2 0 reversals across 100-step sweep (monotone interpolation), G3 D=8 scalar+mix 18.9ns<50ns + D=8 mix-only 5.0ns<20ns + D=64 per-channel+mix 355.7ns<1500ns, G4 0 allocs/100 calls, G6 sigmoid(0)=0.5->cos=sin=1/sqrt2 confirmed (softmax would give 1.0). Pure modelless: closed-form cos/sin/sigmoid/dot, no training. Design pivot: independent Pade cos/sin drifts in cos^2+sin^2=1 by ~5e-3 (50x G1 budget) -> replaced with phase_safe_cos_sin (libm sin + Pythagorean sqrt(1-sin^2) recovery).  # spherical_steering DEFAULT-ON (Plan 405 Phase 2, 2026-07-06): G1 norm-preservation max rel drift D=8 8.22e-7/D=64 5.04e-7 (budget 1e-4, 122-199x under) + Slerp unit-modulus identity drift 8.35e-7 (budget 1e-5), G2 0 NaN/0 OOB across 16000 vmf-gate combos + aligned lerp drift 0.0 + antipodal returns AntipodalDegenerate cleanly, G3 D=8 full 37.6ns<100ns + D=8 mix-only 31.7ns<80ns + D=64 full 58.9ns<1500ns (25x headroom -- Slerp atan2+sin+FMA is ~2x Plan 322's 18.9ns, not 3-5x as feared), G4 0 allocs/100 calls, G5 double-Slerp drift correction monotone (-0.32->0.58->0.89 cosine to target), G6 sigmoid fingerprint exact (delta=0 at s_t=0, not softmax's 0.5). Pure modelless (closed-form trig + sigmoid, no training). Zero runtime cost unless invoked.  # indicator_probe_bank + indicator_similarity DEFAULT-ON (Plan 320 Phase 5, 2026-06-25): G1 per-indicator AU-ROC 1.000 (all 8 ≥ 0.85), G2 OR-fusion transcript-TPR 1.000 at turn-FPR 0.041 (≤0.05), G3 cascade 100× FPR reduction at 0pp TPR cost, G4 53.9ns/call (<200ns) + 0 allocs/100 calls, G5 cluster ARI 1.000 (≥0.9), G6 feature-off clean, G7 wire tamper-evident. Pure modelless read-side primitives (sigmoid-gated dot-projection onto BLAKE3-committed frozen directions + pairwise cosine structure). indicator_cascade stays OPT-IN (consumer-crate verifier territory).  # arg_protocol DEFAULT-ON (Plan 327 Phase 4, 2026-06-25): G1 61 tests, G2a PolicyEnvelope ~0.4ns<50ns, G2b TaxonomyValidator ~170ns<200ns (264-node taxonomy), G3 all-features/default/no-default clean, G4 0 allocs/100 calls (fixed via scratch.accepted + clone-instead-of-mem::take), G5 silence-bias strict inequalities. Pure modelless protocol primitives (PolicyEnvelope, TaxonomyValidator, LifecycleState+RedirectTable, TypedOfflineCandidate+OfflineCandidateScorer, InfoRegistry) distilled from the ARG Standard.  # tucker_factorization DEFAULT-ON (Plan 326 Phase 3): G1 4.1e-8<1e-4, G2 71us<500us, G3 1.0e-6<1e-4, G4 0 allocs. Pure modelless HOSVD.  # spectral_differentiation DEFAULT-ON (Plan 325 Phase 3, 2026-06-25): G1 order1 err 5.4e-7<1e-4 + order2 err 1.3e-6<1e-3 + spectral-vs-FD 290x>=100x, G2 N=1024 3.82us<50us (13x under), G3 order=0 identity err 2.4e-7<1e-5, G4 0 allocs/100 calls (fixed via cached Arc<Fft> plans + process_with_scratch instead of rustfft's per-call-Vec process()). Pure modelless closed-form FFT.  # fourier_continuation DEFAULT-ON (Plan 323 Phase 3, 2026-06-25): G1 wrap discontinuity <50% of naive + interior join C1-smooth, G2 8.9us<50us, G3 passthrough bit-identical, G4 0 allocs. The one modelless FNO primitive the codebase genuinely lacked.  # geometric_product DEFAULT-ON (Plan 319 Phase 3 + Issue 003 RESOLVED, 2026-06-25): polynomial Padé [4/4] SiLU eliminates the exp() floor (2.06× D=64 speedup); G1 non-redundancy +17.6/+7.9pp, G2 r=0.90/0.96, G3 0 allocs, G4 D=8 118ns<150ns / D=64 525ns<600ns (recalibrated from structurally-impossible 50/200ns). Wedge-only variant for cold-path callers.  # viable_manifold_graph DEFAULT-ON (Plan 312 Phase 5, 2026-06-24): G1-G7 correctness all PASS + perf bench PASS post-CSR (manifold_random_walk 485.58→7.10 ns/step, 14× under 100ns target). CSR adjacency makes for_each_neighbor O(degree); random-walk output byte-identical (neighbor order preserved).  # ac_prefix DEFAULT-ON (Plan 313 Phase 4 + Issue 003 Phase 0 RESOLVED, 2026-06-24): original G1 (matches iterative-MLM logprob to 1e-4) was failing at 7.5e-4 due to doubled-signal bias. §3.5 modelless unblock (Path 2: deterministic mask correction `attends_dedup`) eliminates the bias — dedup mask is bit-identical to iterative-MLM (0.0 diff) on single-layer micro-GPT. G2 27.258x speedup, G3 0 mismatches, G4 0 allocs. Multi-layer equivalence remains a non-blocking riir-train follow-up. See .benchmarks/313_ac_prefix_modelless.md.  # latent_field_steering DEFAULT-ON (Plan 309 Phase 4, 2026-06-23): G1-G5 all PASS - G1 fear-axis 1.50x>=1.30, G2 mean cos 0.9958>=0.95 min cos 0.9667>=0.90, G3 leakage 4.5e-5<0.01, G4 19.2us<1ms, G5 0 allocs. Caveat: 8% argmax flip at alpha=0.3 - keep alpha<=0.3 for hot-path. | cross_resolution_transport DEFAULT-ON (Plan 310 Phase 4, 2026-06-23): G1 mean cos 0.8944>=0.85, G2-A rank preservation mean cos 0.9300>=0.85 (Super-GOAT headline holds), G3 elbow k=8, G4 0 allocs. Implies funcattn as transitive default.  # depth_invariance DEFAULT-ON (Plan 306 T7.4): G1/G2/G3 PASS, G4 re-spec to absolute-latency at HLA scale (all PASS). Zero runtime cost unless invoked. | triggered_injection DEFAULT-ON (Plan 278 GOAT G3) — sigmoid-thresholded inject/skip gate; temporal_deriv DEFAULT-ON (Plan 277 GOAT 4/4 fusions passed) — dual fast/slow EMA surprise signal; bom_sampling DEFAULT-ON (Plan 281 T2.4 full, 2026-06-17) — G2 PASS +31.49pp on 100 episodes proven in riir-ai Plan 314 (MultiThreatArena + MultiHypothesisBoMMinimaxPlanner vs deterministic). Auto-enables micro_belief + simd_sigmoid.
mcts_state_action_cache = ["dep:papaya"]  # State-Action Pair Cache for MCTS over Deterministic Inference Actions (Plan 390, Research 386, arXiv:2602.04344 UnMaskFork). StateActionCache keyed on (blake3::Hash, InferenceAction) pairs + mcts_search_with_state_action_cache entry point. papaya is the only new dep — blake3 is already non-optional in this crate. Opt-in until G1-G5 GOAT gate passes.
# NOTE: the plan text (T1.1) specified `["dep:papaya", "dep:blake3"]`, but blake3 is listed as a non-optional dependency in [dependencies] (line 16), so `dep:blake3` would be invalid (dep: only applies to optional deps). Deviation documented here.
sparse_mlp = ["katgpt-types/sparse_mlp"]
domain_latent = ["katgpt-types/domain_latent"]
maxsim = ["katgpt-types/maxsim"]
dllm = []  # Discrete diffusion language model support (Plan 068)
coda_fusion = []  # CODA-inspired fused SIMD kernels — matmul+residual+rmsnorm+activation (Plan 103)
lt2_looped = []  # LT2 looped inference types — LoopMode, HybridPattern, SdpaOutputGate, ResidualGate (Plan 108)
tiled_attention = []  # Tiled online-softmax flash attention for CPU SIMD (Plan 115)
parallax_attn = ["tiled_attention"]  # Parallax parameterized local linear attention — R projection + covariance branch (Plan 135, Research 135) — opt-in
sr2am_configurator = ["katgpt-types/sr2am_configurator"]  # SR²AM Configurator Bandit — learned per-turn planning regulation (Plan 112, Research 076)
data_gate = ["katgpt-types/data_gate"]  # Task-level data gating for self-play training stability (Plan 111, Research 075)
cgsp = ["data_gate", "collapse_aware_thinking"]  # Curiosity-Guided Self-Play — modelless Solver/Conjecturer/Guide triad (Plan 274, Research 240). Self-contained: defines its own HintDeltaBandit/CollapseSignal/DifficultyFilter/BatchQualityGate traits. Moved from katgpt root to katgpt-core so riir-engine (Plan 299) can consume via katgpt-core/cgsp. Opt-in — keep off default until riir-ai Plan 299 Phase 3 GOAT gate validates on real game domains.
