[package]
name = "katgpt-core"
version = "0.2.0"
edition = "2024"
license = "MIT"
description = "Shared types and SIMD kernels for katgpt-rs and riir-engine"
repository = "https://github.com/katopz/katgpt-rs"
readme = "README.md"
keywords = ["inference", "simd", "modelless", "attention", "manifold"]
categories = ["algorithms", "science", "data-structures"]

[dependencies]
fastrand = "2"
rayon = "1.10"
log = "0.4"
blake3 = "1"
serde = { version = "1", features = ["derive"] }
postcard = { version = "1", features = ["alloc"] }
half = "2"
bytemuck = { version = "1", features = ["derive"] }
# Stack-allocated Vec for MCTSNode children/unexpanded (Plan 008 Phase 2.6):
# eliminates per-node heap allocation. Capacity bounded by MAX_UNEXPANDED=16
# (covers Bomber=6, Grid=5, Raid=~9 branching factors with headroom).
arrayvec = "0.7"
papaya = { version = "0.2", optional = true }
rustfft = { version = "6", optional = true }
lz4_flex = { version = "0.13", optional = true }
# ahash is used by `closure_instrument` (Plan 290 G1 hot-path optimization).
# Already a transitive dep via hashbrown 0.14 / bevy_utils — listing it here only
# promotes it to a direct dependency for the `closure_instrument` feature.
ahash = { version = "0.8", optional = true }
# katgpt-dec houses the Discrete Exterior Calculus substrate spun out of
# katgpt-core::dec (Issue 007 Phase E Tier 1). Optional — pulled in by the
# `dec_operators` feature and re-exported as `katgpt_core::dec` for backwards
# compatibility.
katgpt-dec = { path = "../katgpt-dec", optional = true }
# katgpt-types houses the shared types + SIMD substrate spun out of
# katgpt-core::{types, simd} (Issue 007 Phase E Tier 1 #2). Always-on — the
# types/simd modules are foundational substrate that every other katgpt-core
# module consumes. Re-exported as `katgpt_core::types` and `katgpt_core::simd`
# for backwards compatibility.
katgpt-types = { path = "../katgpt-types" }
# katgpt-micro-belief houses the micro-recurrent belief-state kernel spun out
# of katgpt-core::micro_belief (Issue 007 Phase E Tier 1 #3). Optional — pulled
# in by the `micro_belief` feature and re-exported as `katgpt_core::micro_belief`
# for backwards compatibility.
katgpt-micro-belief = { path = "../katgpt-micro-belief", optional = true }
# katgpt-hla houses the Higher-order Linear Attention substrate (cache types +
# streaming kernels) spun out of katgpt-core::hla (Issue 007 Phase E Tier 2 #4).
# Always-on — the HLA substrate is unconditional substrate (mirrors the
# pre-promotion `pub mod hla;`), re-exported as `katgpt_core::hla` for
# backwards compatibility. The composition layer (`forward_hla` /
# `forward_ahla`) stays in katgpt-core because it depends on ForwardContext.
katgpt-hla = { path = "../katgpt-hla" }
# katgpt-personality houses the Personality-Weighted Latent Layer Composition
# substrate (sigmoid + kernel + snapshot + types) spun out of
# katgpt-core::personality_composition (Issue 007 Phase E Tier 2 #5). Optional
# — pulled in by the `personality_composition` feature and re-exported as
# `katgpt_core::personality_composition` for backwards compatibility.
katgpt-personality = { path = "../katgpt-personality", optional = true }
# katgpt-sleep houses the Sleep-Time Query Anticipator substrate (anticipator
# + consume + cost_model + predictability + types) spun out of
# katgpt-core::sleep_time (Issue 007 Phase E Tier 2 #6). Optional — pulled in
# by the `sleep_time_anticipation` feature and re-exported as
# `katgpt_core::sleep_time` for backwards compatibility.
katgpt-sleep = { path = "../katgpt-sleep", optional = true }
# katgpt-sense houses the KG Latent Octree Sense substrate (octree,
# reconstruction, bake, lod, schema_centroid, sector, serialize) spun out of
# katgpt-core::sense (Issue 007 Phase E Tier 2 #7, Plan 338). Optional —
# pulled in by the `sense_composition` feature and re-exported as
# `katgpt_core::sense::*` for backwards compatibility. `spectral_threat`
# stays local in katgpt-core (depends on `linoss`) and is re-exported through
# the `sense::spectral_threat` shim path.
katgpt-sense = { path = "../katgpt-sense", optional = true }
# Plan 299 T4.3: tokenizer compression (NFKC + lowercase collapse) for the
# `engram` feature. Small dep, only compiled when `engram` is on.
unicode-normalization = { version = "0.1", optional = true }

[dev-dependencies]
serde_json = "1"
# Used by the Plan 323 Fourier-continuation GOAT bench (G1 FFT-based Gibbs
# suppression test). Already a normal optional dep; listed here so the bench
# target can use it without enabling an unrelated feature.
rustfft = "6"
# criterion pulls rayon, which has no wasm32 backend. Benches run on native
# only; gate accordingly so wasm32 example builds (Issue 007 GOAT harness)
# don't unify it in.
[target.'cfg(not(target_arch = "wasm32"))'.dev-dependencies]
criterion = { version = "0.5", features = ["html_reports"] }
# proptest pulls rusty-fork → wait-timeout, which has no wasm32 backend.
# Property tests (Plan 299 T1.7) run on native only; gate accordingly so
# wasm32 example/bench builds (Issue 007 GOAT harness) don't unify it in.
proptest = "1"  # Plan 299 T1.7 — multi_head_hash property tests (determinism + uniform distribution)
# statrs test-only reference for best_belief G1 GOAT gate (Plan 336 T2.1).
# Native-only — pulls deps that don't wasm-build.
statrs = "0.17"

[features]
default = ["sparse_mlp", "plasma_path", "leo_all_goals", "dual_leo", "sigmoid_margin", "spectral_hierarchy", "dual_gram_pca", "roofline_cost", "octree_ctc", "sector_projection", "action_bridge", "triggered_injection", "temporal_deriv", "bom_sampling", "personality_composition", "depth_invariance", "cross_resolution_transport", "latent_field_steering", "viable_manifold_graph", "ac_prefix", "geometric_product", "fourier_continuation", "spectral_differentiation", "tucker_factorization", "arg_protocol", "indicator_probe_bank", "indicator_similarity", "phase_rotation_coupling", "closure_instrument", "non_interference_branches", "funcattn_structured_basis", "best_belief", "committed_field_blend", "tropical_algebra", "temp_loss_fingerprint", "zone_density_routing", "set_attention"]  # set_attention DEFAULT-ON (Plan 354 Phase 2 + Plan 355 G6/G7/G9, 2026-07-01): G1 permutation equivariance bit-exact (1e-6 tol), G2 identity-floor meaningfulness on 2-cluster, G3 latency 21.96us at N=64 (2200x headroom under 50ms tick), G4 0 allocs/100 calls, G5 sigmoid-not-softmax lonely-query correctness. riir-ai runtime G6 fusion cosine sim <0.95 (fusion adds value over identity), G7 crowd stability <5% drift over 100x2000 ticks, G9 production latency 75.7us mean/tick at 100 NPCs (6.6x headroom under 500us gate). G8 collective inference FAILED (Super-GOAT->GOAT) -- averaging cannot amplify detection; use-case limitation, NOT a primitive defect. Validated selling point: crowd coherence (belief sync, noise reduction, contextual awareness). Pure modelless (closed-form sigmoid gates, no training).  # zone_density_routing DEFAULT-ON (Plan 351 Phase 3, 2026-06-29): G5a +19.4% entropy, G5b 99.1% compute saved, G5c 0 stale reads. Modelless.  # temp_loss_fingerprint DEFAULT-ON (Plan 341 Phase 2, 2026-06-29): G1 bound preservation 15.44x>=2x (Gaussian mixture fixture, MIN pairwise bound metric = greedy max-min objective), G2 prefix sweep Kendall tau 0.9839>=0.85 at N=32 vs N=256 (paper Fig. 6 modelless analog), G3 perturbed_loss_vector 2.46us<5us + select_diverse_subset 130us<1ms + 0 allocs hot path, G4 bit-identical determinism, G5 134/134 each-feature clean. riir-neuron-db Plan 005 G2' integration gain +0.1672 (modelless). 673/673 tests pass.  # tropical_algebra DEFAULT-ON (Plan 337 Phase 3, 2026-06-28): G1 non-redundancy 3/3 PASS (S1 DEC cochain top-3 sym-diff=2, S2 HLA pairs rho=+0.3468, S3 path rho=+0.6991) -> Super-GOAT quality tier. G2 perf PASS at gate dims after NEON specialization (T3.4): D=64 0.96x, D=128 1.03x vs simd_matvec (D=8 0.82x, noted caveat — HLA use case is sparse DEC wrappers not dense 8x8 matvec). G3 clean, G4 0 allocs, G5 pure modelless (max +). Result noisy at D=64 boundary (0.80-0.96x across runs); D=128 solidly ~1.0x. riir-ai/.research/164 guide.  # committed_field_blend DEFAULT-ON (2026-06-28, Issue 005 executed): Plan 321 G1–G5 + riir-ai Plan 336 G6a–G6e + G7a ALL PASS. FAME sampling-invariant per-entity MoE. Modelless (closed-form sigmoid projection + BLAKE3 commit). Implies personality_composition (already default). G2 sampling-invariance worst-case Δpi=1.19e-6/100 entities; G4 zero-alloc apply+commit; G6d median 0.177ms ≤ 10ms (56× headroom); G7a frozen-restoration bit-identical. Zero runtime cost unless a caller invokes commit/apply_blended.  # non_interference_branches DEFAULT-ON (Plan 329 Phase 3, 2026-06-26): G1 8 orthogonal directions in D=8 (pairwise interference 0.00e0<1e-6; write to b_i does not contaminate b_j stores; 9th direction interferes 0.3536>=1/sqrt(8)=0.3536), G2 route 301.5ns<1us (64-branch bank, 3.3x margin), G3 all clean, G4 0 allocs/100 calls, G5 [] deps. 101/101 tests.  # closure_instrument DEFAULT-ON (Plan 290 T4.7 + G4 fix, 2026-06-26): G1 67us<100us (bit matrix, Issue 035), G2 638us<5ms, G3 synthetic-proxy monotone, G4 0.296MB<1MB (Option<[u8;32]> fix). 55/55 tests green. API break: PtgNode.blake3_in [u8;32] -> Option<[u8;32]>.  # phase_rotation_coupling DEFAULT-ON (Plan 322 Phase 2, 2026-06-25): G1 per-channel Pythagorean drift 5.96e-8<1e-4 + norm bound violation 0<1e-4 + scalar libm drift 1.19e-7, G2 0 reversals across 100-step sweep (monotone interpolation), G3 D=8 scalar+mix 18.9ns<50ns + D=8 mix-only 5.0ns<20ns + D=64 per-channel+mix 355.7ns<1500ns, G4 0 allocs/100 calls, G6 sigmoid(0)=0.5->cos=sin=1/sqrt2 confirmed (softmax would give 1.0). Pure modelless: closed-form cos/sin/sigmoid/dot, no training. Design pivot: independent Pade cos/sin drifts in cos^2+sin^2=1 by ~5e-3 (50x G1 budget) -> replaced with phase_safe_cos_sin (libm sin + Pythagorean sqrt(1-sin^2) recovery).  # indicator_probe_bank + indicator_similarity DEFAULT-ON (Plan 320 Phase 5, 2026-06-25): G1 per-indicator AU-ROC 1.000 (all 8 ≥ 0.85), G2 OR-fusion transcript-TPR 1.000 at turn-FPR 0.041 (≤0.05), G3 cascade 100× FPR reduction at 0pp TPR cost, G4 53.9ns/call (<200ns) + 0 allocs/100 calls, G5 cluster ARI 1.000 (≥0.9), G6 feature-off clean, G7 wire tamper-evident. Pure modelless read-side primitives (sigmoid-gated dot-projection onto BLAKE3-committed frozen directions + pairwise cosine structure). indicator_cascade stays OPT-IN (consumer-crate verifier territory).  # arg_protocol DEFAULT-ON (Plan 327 Phase 4, 2026-06-25): G1 61 tests, G2a PolicyEnvelope ~0.4ns<50ns, G2b TaxonomyValidator ~170ns<200ns (264-node taxonomy), G3 all-features/default/no-default clean, G4 0 allocs/100 calls (fixed via scratch.accepted + clone-instead-of-mem::take), G5 silence-bias strict inequalities. Pure modelless protocol primitives (PolicyEnvelope, TaxonomyValidator, LifecycleState+RedirectTable, TypedOfflineCandidate+OfflineCandidateScorer, InfoRegistry) distilled from the ARG Standard.  # tucker_factorization DEFAULT-ON (Plan 326 Phase 3): G1 4.1e-8<1e-4, G2 71us<500us, G3 1.0e-6<1e-4, G4 0 allocs. Pure modelless HOSVD.  # spectral_differentiation DEFAULT-ON (Plan 325 Phase 3, 2026-06-25): G1 order1 err 5.4e-7<1e-4 + order2 err 1.3e-6<1e-3 + spectral-vs-FD 290x>=100x, G2 N=1024 3.82us<50us (13x under), G3 order=0 identity err 2.4e-7<1e-5, G4 0 allocs/100 calls (fixed via cached Arc<Fft> plans + process_with_scratch instead of rustfft's per-call-Vec process()). Pure modelless closed-form FFT.  # fourier_continuation DEFAULT-ON (Plan 323 Phase 3, 2026-06-25): G1 wrap discontinuity <50% of naive + interior join C1-smooth, G2 8.9us<50us, G3 passthrough bit-identical, G4 0 allocs. The one modelless FNO primitive the codebase genuinely lacked.  # geometric_product DEFAULT-ON (Plan 319 Phase 3 + Issue 003 RESOLVED, 2026-06-25): polynomial Padé [4/4] SiLU eliminates the exp() floor (2.06× D=64 speedup); G1 non-redundancy +17.6/+7.9pp, G2 r=0.90/0.96, G3 0 allocs, G4 D=8 118ns<150ns / D=64 525ns<600ns (recalibrated from structurally-impossible 50/200ns). Wedge-only variant for cold-path callers.  # viable_manifold_graph DEFAULT-ON (Plan 312 Phase 5, 2026-06-24): G1-G7 correctness all PASS + perf bench PASS post-CSR (manifold_random_walk 485.58→7.10 ns/step, 14× under 100ns target). CSR adjacency makes for_each_neighbor O(degree); random-walk output byte-identical (neighbor order preserved).  # ac_prefix DEFAULT-ON (Plan 313 Phase 4 + Issue 003 Phase 0 RESOLVED, 2026-06-24): original G1 (matches iterative-MLM logprob to 1e-4) was failing at 7.5e-4 due to doubled-signal bias. §3.5 modelless unblock (Path 2: deterministic mask correction `attends_dedup`) eliminates the bias — dedup mask is bit-identical to iterative-MLM (0.0 diff) on single-layer micro-GPT. G2 27.258x speedup, G3 0 mismatches, G4 0 allocs. Multi-layer equivalence remains a non-blocking riir-train follow-up. See .benchmarks/313_ac_prefix_modelless.md.  # latent_field_steering DEFAULT-ON (Plan 309 Phase 4, 2026-06-23): G1-G5 all PASS - G1 fear-axis 1.50x>=1.30, G2 mean cos 0.9958>=0.95 min cos 0.9667>=0.90, G3 leakage 4.5e-5<0.01, G4 19.2us<1ms, G5 0 allocs. Caveat: 8% argmax flip at alpha=0.3 - keep alpha<=0.3 for hot-path. | cross_resolution_transport DEFAULT-ON (Plan 310 Phase 4, 2026-06-23): G1 mean cos 0.8944>=0.85, G2-A rank preservation mean cos 0.9300>=0.85 (Super-GOAT headline holds), G3 elbow k=8, G4 0 allocs. Implies funcattn as transitive default.  # depth_invariance DEFAULT-ON (Plan 306 T7.4): G1/G2/G3 PASS, G4 re-spec to absolute-latency at HLA scale (all PASS). Zero runtime cost unless invoked. | triggered_injection DEFAULT-ON (Plan 278 GOAT G3) — sigmoid-thresholded inject/skip gate; temporal_deriv DEFAULT-ON (Plan 277 GOAT 4/4 fusions passed) — dual fast/slow EMA surprise signal; bom_sampling DEFAULT-ON (Plan 281 T2.4 full, 2026-06-17) — G2 PASS +31.49pp on 100 episodes proven in riir-ai Plan 314 (MultiThreatArena + MultiHypothesisBoMMinimaxPlanner vs deterministic). Auto-enables micro_belief + simd_sigmoid.
sparse_mlp = ["katgpt-types/sparse_mlp"]
domain_latent = ["katgpt-types/domain_latent"]
maxsim = ["katgpt-types/maxsim"]
dllm = []  # Discrete diffusion language model support (Plan 068)
coda_fusion = []  # CODA-inspired fused SIMD kernels — matmul+residual+rmsnorm+activation (Plan 103)
lt2_looped = []  # LT2 looped inference types — LoopMode, HybridPattern, SdpaOutputGate, ResidualGate (Plan 108)
tiled_attention = []  # Tiled online-softmax flash attention for CPU SIMD (Plan 115)
parallax_attn = ["tiled_attention"]  # Parallax parameterized local linear attention — R projection + covariance branch (Plan 135, Research 135) — opt-in
sr2am_configurator = ["katgpt-types/sr2am_configurator"]  # SR²AM Configurator Bandit — learned per-turn planning regulation (Plan 112, Research 076)
data_gate = ["katgpt-types/data_gate"]  # Task-level data gating for self-play training stability (Plan 111, Research 075)
cgsp = ["data_gate", "collapse_aware_thinking"]  # Curiosity-Guided Self-Play — modelless Solver/Conjecturer/Guide triad (Plan 274, Research 240). Self-contained: defines its own HintDeltaBandit/CollapseSignal/DifficultyFilter/BatchQualityGate traits. Moved from katgpt root to katgpt-core so riir-engine (Plan 299) can consume via katgpt-core/cgsp. Opt-in — keep off default until riir-ai Plan 299 Phase 3 GOAT gate validates on real game domains.
cgsp_dual_pool = ["cgsp"]  # Dual-Pool Reachable Memory Router — DecentMem distillation (Plan 282, Research 249, arXiv:2605.22721). Sigmoid-routed E/X pools with proactive non-trapping (Thm. 1) + O(log T) regret (Thm. 2). Extends single-pool CGSP (degenerate α=1). Opt-in until G1–G5 GOAT gate passes.
questbench = []  # QuestBench underspecification scoring for modelless architecture (Plan 110, Research 008)
tf_loop = ["lt2_looped"]  # Training-free loop wrapper — ODE-refined sub-stepping (Plan 136)
plasma_path = ["katgpt-types/plasma_path"]  # Bit-plane ternary SIMD matvec — multiplication-free CPU inference (Plan 148, Research 110)
peira_distill = []  # PEIRA inter-view regressor alignment (Plan 153)
dirichlet_energy = []  # Dirichlet Energy structural alignment diagnostic (Research 111, Plan 149)
leo_all_goals = []  # LEO all-goals Q-value framework — LeoHead + AllGoalsUpdate + sigmoid_bounded_q (Plan 155)
dual_leo = ["leo_all_goals"]  # Dual LEO teacher-student — + DualLeoMixer + AutocurriculumSampler (Plan 155)
spectral_hierarchy = []  # Spectral hierarchy diagnostic — eigenspace alignment, Haar wavelets, Cauchy interlacing (Plan 156)
sigmoid_margin = ["maxsim", "katgpt-types/sigmoid_margin"]  # Sigmoid margin loss + retrieval margin diagnostic (Research 123, Plan 157)
dual_gram_pca = []  # Dual-Gram PCA routing for short-sequence calibration (Research R130, Plan 159)
roofline_cost = []  # Roofline cost model for GPU operator runtime prediction (Research R130, Plan 159)
moa_inference = []  # MoA Mixture of Activations — token-adaptive activation mixing (Research 126, Plan 158)
sia_feedback = ["sr2am_configurator", "katgpt-types/sia_feedback"]  # FeedbackBandit — harness + weight co-evolution (Plan 163, Research 033)
hydra_budget = ["katgpt-types/hydra_budget"]  # Hydra-Aware Adaptive Layer Budget types (Research 148, Plan 165)
deltanet_inference = ["katgpt-types/deltanet_inference"]  # DeltaNet GPU inference — hybrid DeltaNet/Attention decode (Plan 182, Research R036)
rim_slots = ["katgpt-types/rim_slots"]  # RiM Reasoning Buffer Slots — fixed latent workspace for DDTree (Plan 172, Research 192)
wall_attention = ["katgpt-types/wall_attention"]  # Wall Attention — diagonal forget gates replacing RoPE (Plan 173, Research Wall Attention)
mux_pruner = []  # MuxSpanPruner — vocabulary simplex pruning (Research 158, MUX)
mux_ddtree = ["mux_pruner"]  # MuxDdTree — superposition branch DDTree nodes (Research 158, MUX)
mux_bandit_width = []  # MuxBanditWidth — adaptive superposition width (Research 158, MUX)
mux_bfs = ["mux_ddtree"]  # MUX BFS — superposition-guided parallel tree search (Research 158)
mux_freeze_thaw = ["mux_pruner"]  # MUX Freeze/Thaw — persistent superposition patterns (Research 158)
comp_width = []  # Compositional DDTree partner-entropy width — continuous replacement for PEAK_DOMINANCE_RATIO (Plan 205, Research 181)
mux_demux = []  # MuxDemux Verifier — deterministic superposition recovery (Research 158, MUX)
and_or_dtree = []  # AND-OR DDTree — generic AND-OR tree for hierarchical goal decomposition (Plan 190, Research 170)
speculative_generator = []  # SpeculativeGenerator trait unification — generic generate+validate contract (Plan 193)
partial_scoring = []  # PartialScorer graduated reward for game episodes (Plan 191, Research 171)
problem_mutator = []  # ProblemMutator game config evolution (Plan 191, Research 171)
idea_divergence = ["partial_scoring"]  # IdeaDivergence strategic novelty filter (Plan 191, Research 171)
modal_spec = []  # ModalSpec drafter — LinOSS cell + Fourier basis speculative decoding (Plan 189 Phase 3, experimental)
collapse_aware_thinking = ["katgpt-types/collapse_aware_thinking"]  # Collapse-Aware Adaptive Thinking — CollapseDetector trait (Plan 212)
substrate_gate = []  # SubstrateGate passthrough — inference-time capability substrate routing (Plan 216)
belief_drafter = ["katgpt-types/belief_drafter"]  # NextLat Belief-State Speculative Drafter — entropy threshold config (Plan 217)
best_belief = []  # ε-quantile Beta lower bound for conservative selection (Plan 336, Research 320, RQGM arXiv:2606.26294 Prop. 4). Complements sample_beta (Thompson exploration) with a conservative-exploitation counterpart. DEFAULT-ON (Phase 2 G2-unblock, 2026-06-28): LUT hot path 3.38ns<<100ns (32x32x5 table bit-identical to closed-form), G1 3.099e-5<1e-4, G4 0 allocs.
conformal_predictive_intervals = []  # Conformal Predictive Intervals — modelless UQ overlay (Plan 340, Research 322, arXiv:2605.03789 CSP + arXiv:2606.09473 "Report the Floor"). Wraps any PointForecaster (SeasonalPoolForecaster ships; KARC adapter in Phase 2) with a per-channel × per-horizon-bucket exp-recency-weighted residual ring buffer, reads empirical quantiles to produce coverage-guaranteed predictive intervals [point+q_{α/2}, point+q_{1−α/2}]. CRPS / Winkler / empirical-coverage metrics (conformal::metrics). The ConformalIntervalCalibrator<SeasonalNaiveForecaster> with m=1 is the canonical conformal-naive floor — every UQ-bearing primitive's GOAT gate MUST beat it (Issue 010 "Report the Floor" rule, AGENTS.md Feature Flag Discipline). No training, no learned params. Opt-in until G1–G4 GOAT gate passes; promotion to default-on deferred until Plan 342 riir-ai runtime integration confirms the curiosity false-positive win.
sense_composition = ["plasma_path", "domain_latent", "dep:katgpt-sense", "katgpt-sense/sense_composition"]  # KG Latent Octree Sense Composition (Plan 221). Substrate lives in the katgpt-sense crate (Issue 007 Phase E Tier 2 #7, Plan 338); this feature turns on the re-export + forwards the flag. NOTE: when `self_advantage_gate` is also enabled, the forward there picks up the inline advantage gate in katgpt-sense's reconstruction.rs — but only when this feature (sense_composition) is also active (otherwise katgpt-sense is not compiled and the gate is inert, matching pre-refactor behavior).
slod = ["spectral_hierarchy"]  # SLoD Spectral Level-of-Detail Pruner (Plan 235, GOAT G1-G6 all pass, default-ON)
rat_plus_bridge = []  # RAT+ Recurrence Bridge — modelless dilated inference via GDN2 state (Plan 225)
schema_centroid = ["sense_composition", "katgpt-sense/schema_centroid"]  # Schema-Centroid Informed KG Embedding Initialization (Plan 237) — papaya now lives in katgpt-sense
bake_precision = ["sense_composition", "katgpt-sense/bake_precision"]  # BAKE Precision-Gated Bayesian Embedding Update (Plan 236) — papaya now lives in katgpt-sense
spectral_threat = ["sense_composition", "modal_spec", "katgpt-types/spectral_threat"]  # LinOSS Modal Threat Prediction (Plan 241) — stays local in katgpt-core (depends on linoss)
sense_lod = ["sense_composition", "slod", "katgpt-sense/sense_lod"]  # Spectral NPC Perception Compression (Plan 240)
set_attention = []  # Cross-Datapoint Set Attention — sigmoid-gated, permutation-equivariant cross-entity refinement kernel (Plan 354, Research 354, arXiv:2106.02584 Kossen et al. NeurIPS 2021). Distilled from Non-Parametric Transformers: the inference-time operator only (training of Q/K/V via BERT-style masking stays in riir-train). Substrate-agnostic: operates on &[f32], produces &mut [f32], no opinion on what vectors mean. Sigmoid gates (NEVER softmax per AGENTS.md §2) — each pair independently ∈ (0,1), so an entity may attend to 0/1/many peers. DEFAULT-ON (Plan 354 Phase 2 + Plan 355 G6/G7/G9, 2026-07-01): G1 permutation equivariance bit-exact (1e-6 tol), G2 identity-floor meaningfulness on 2-cluster, G3 latency 21.96µs at N=64 (2200× headroom under 50ms tick), G4 0 allocs/100 calls, G5 sigmoid-not-softmax lonely-query correctness. riir-ai runtime G6 fusion cosine sim <0.95 (fusion adds value over identity), G7 crowd stability <5% drift over 100×2000 ticks, G9 production latency 75.7µs mean/tick at 100 NPCs (6.6× headroom under 500µs gate). G8 collective inference FAILED (Super-GOAT→GOAT) — averaging cannot amplify detection; use-case limitation, NOT a primitive defect. Validated selling point: crowd coherence (belief sync, noise reduction, contextual awareness). Pure modelless (closed-form sigmoid gates, no training).
flow_field_nav = ["leo_all_goals", "dep:rustfft"]  # Fourier-smoothed flow fields for LEO crowd navigation (Plan 242, GOAT-gated)
spectral_pruner = ["dep:rustfft"]  # Spectral Irrep Pruner — spectral flatness-based speculative decoding pruning (Plan 246, GOAT PASS +3.6% overhead, default-ON)
                                   # Inspired by arXiv:2606.02993: prunes tokens when logit spectrum shows competing modes.
octree_ctc = ["sense_composition"]  # OctreeCTC Reconstructive Memory Navigation (Plan 248, GOAT PASS, arXiv:2606.06036)
newton_schulz = []  # Newton-Schulz orthogonalization + Muon momentum (Plan 152, Research 114, GOAT 25/25 Bench 050). Pure substrate: zero `crate::` deps, zero external deps — self-contained f32 linear algebra (transpose, matmul, 5-iteration cubic Newton-Schulz). Extracted from katgpt-rs/src/ per Issue 355 Phase 1a. Root re-exports via `pub use katgpt_core::newton_schulz;` so historical `katgpt_rs::newton_schulz::*` paths keep resolving. NOT in katgpt-core `default` — root's default-on forwarder activates it; other katgpt-core consumers (e.g. riir-gpu `lora_muon_optimizer`) enable it explicitly.
subspace_phase_gate = []  # Subspace phase-gate primitives — participation ratio, numerical rank, N≥d phase-transition gate (Wang et al. Thm 4, arXiv:2409.02426), runtime Jacobian SVD via forward differences (Plan 301, Research 279). Pure numeric, no extra deps. Opt-in until G1 GOAT gate passes.
