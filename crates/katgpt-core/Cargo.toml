phase_rotation_coupling = []  # Phase-Modulated Subspace Rotation Gate — norm-preserving latent coupling `cos α ⊙ a + sin α ⊙ b` with phase from a sigmoid projection onto a frozen direction vector (Plan 322, Research 305, arxiv 2605.12700 UFO). The genuinely-new operation class: every other latent op in the crate is additive / convex-combo / dot-projection / wedge-detection / linear-transport / spatial-sum — none has the `sin²α+cos²α=1` Pythagorean norm-preservation invariant. §3.5 modelless Path 2 unblock: trained γ_θ replaced with `α = sigmoid(⟨state, direction⟩ · λ) · π/2` (closed-form). Opt-in until G1–G4 GOAT gate passes (G1 norm-preservation <1e-4 is the kill switch; G2 monotone interpolation; G3 latency <50ns D=8 scalar / <600ns D=64 per-channel; G4 zero-alloc).
spherical_steering = []  # Spherical Steering — single-target geodesic Slerp rotation `sin((1−t)θ)/sin θ · ĥ + sin(tθ)/sin θ · μ_T` of a latent vector toward a unit-norm target direction on S^{d-1}, with sigmoid-translated vMF confidence gate (Plan 405, Research 382, arxiv 2602.08169 You/Deng/Chen ICML 2026). Sibling to Plan 322's 2-subspace phase rotation — same norm-preservation thesis, different parameterization: Plan 322 rotates *within* the (a,b) plane (Pythagorean identity); Plan 405 rotates *toward* a target outside the input's direction (Slerp identity `‖c0·ĥ + c1·μ_T‖ = 1` for all θ ∈ (0,π)). Use case: pull a drifted vector back toward a committed archetype direction (F1 fusion hook). vMF gate reduces to sigmoid via Eq 17: `δ = -tanh(κ·s_T) = 1 − 2·sigmoid(2κ·s_T)`. §3.5 modelless Path 3 (closed-form trig + sigmoid; no training). DEFAULT-ON (Plan 405 Phase 2+3, 2026-07-06): G1–G6 all PASS — see the DEFAULT-ON comment above for the full gate summary.
subspace_steering = ["latent_field_steering"]  # Subspace Steering Field — k-dim manifold steering (Plan 412, Research 393, arxiv 2606.25234 Goodfire BSF). The k-dim generalization of Plan 309: an orthonormal block `{u_1..u_k}` + per-axis strengths `{α_1..α_k}`, math `s' = s + Σ_j α_j · u_j`. At K=1 bit-identical to Plan 309; at K≥2 enables manifold walking (sweep alphas over a grid → concept variations). Pure modelless consumer of pre-discovered blocks. Implies latent_field_steering (K=1 parity gate reference). NOTE: Phase 3 `from_directions_orthonormalize` uses Gram-Schmidt, NOT Newton-Schulz — NS diverges on non-square K<D matrices (Plan 412 Phase 3 finding, 2026-07-08). Opt-in until G1–G5 GOAT gate passes (G1 K=1 parity is the load-bearing gate).
region_subspace_steering = ["subspace_steering"]  # Region-Conditioned Subspace Field — MFA local-geometry steering (Plan 416, Research 396, arxiv 2602.02464 Shafran et al. "From Directions to Regions"). The region-conditioned generalization of Plan 412: K regions, each with a centroid μ_k and a local R-dim factor-analyzer subspace W_k. Two-mode steering: centroid interpolation (move toward a region) + local subspace offset (walk within a region). Per-region sigmoid membership gates (reformulated from softmax responsibilities per AGENTS.md — more expressive: multi-region membership). Pure modelless consumer of a frozen MFA-like artifact {μ_k, W_k, Ψ, π} (trained offline via riir-train GD, or deterministically constructed via K-means + per-region PCA). At the degenerate limit (K=1, μ=0, W=I) steer_local is bit-identical to Plan 412. Implies subspace_steering (K=1 parity gate reference). Opt-in until G1–G5 GOAT gate passes.
bisimulation_operator_inference = []  # Bisimulation Operator Inference — generic modelless primitive that quotients an observed transition graph into bisimulation-equivalent state classes and infers an abstract PDDL-like operator schema (Plan 324, Research 308, arXiv:2602.19260 "The Price Is Not Right" Duggan et al. Feb 2026; underlying NSM method arXiv:2508.21501 Lorang et al.). Closes Research 264 §2.2 gap #1 (PTG data structure) + #2 (motif-mining loop). Lighter-weight PDDL-side counterpart to Induced CWM (Plan 296). Opt-in by design — downstream pipelines opt in; the primitive is not a default-on capability. Paige-Tarjan O((S+E) log S) partition refinement, canonical BLAKE3 commitment, BFS planner.
qmc_sampling = []  # Quasi-Monte Carlo uniform sources (Lattice/Stratified/Sobol) for correlated-but-marginally-exact parallel sampling (Plan 367, Research 367, arXiv:2607.01179 QuasiMoTTo). Drop-in replacement for i.i.d. rng.uniform() in K-rollout paths: each rollout is marginally Unif[0,1) exact (linearity of expectation holds for average-type estimators), but the batch covers output space more evenly → 25–47% fewer rollouts for matched pass@k. Zero-dep (Sobol direction numbers computed at construction from GF(2) primitive polynomials; Owen scramble via digital XOR shift). DEFAULT-ON (Plan 367 Phase 5, 2026-07-03): G1 chi-square marginal exactness PASS all 3 sources (Lattice 1.17%, Stratified 0.78%, Sobol 0.39% fail rate vs i.i.d. 0.39%, α=0.01), G2 pass@k Lattice 50% sample reduction (K_qmc=8 vs K_iid=16 at pass@k≥0.5, target ≤0.75; Stratified/Sobol optimized for RL-variance/multi-dim respectively), G3 K=1 bit-identical to i.i.d. (0/10000 mismatches), G4 0 allocs/100 calls, G5 per-rollout 25-34ns (target <1000ns), G6 all-features/no-default clean. Phase 5 GOAT bench caught and fixed critical Sobol scramble bug (OR-of-two-halves → single upper-32-bits). Pure modelless (closed-form arithmetic coding + QMC lattice/strata/Sobol points, no training).
arg_protocol = ["dep:papaya"]  # ARG Protocol Primitives — PolicyEnvelope + TaxonomyValidator + LifecycleState+RedirectTable + TypedOfflineCandidate+OfflineCandidateScorer + InfoRegistry (Plan 327 Phases 1-4, Research 309 — open half of the ARG × Latent Substrate Super-GOAT fusion). Five generic protocol primitives distilled from the ARG Standard (protocol.airistech.ai/arg-core.html). No game/chain/shard semantics. DEFAULT-ON (Plan 327 Phase 4, 2026-06-25): G1-G5 all PASS, pure modelless gain. Private runtime composition lives in riir-ai Plan 337 / Guide 160.
babel_codec = []  # BabelCodec — Readability-relaxed semantic codec (Plan 331, Research 312, arXiv:2606.19857 BabelTele). Open primitive: generic `BabelCodec` trait + `FixedRuleTextCodec` (deterministic BT-P8 fixed symbolic mapping rules for KG-triple / entity-attribute / config / quest-grammar surfaces) + `SigmoidLatentCodec<D>` (generic-trait facade over existing `DensityBudget` infrastructure, latent-level analog) + BLAKE3 commitment. The modelless subset of BabelTele (the paper's headline 3.6× is LLM-prompted, NOT deterministic; we ship the fixed-rule subset). Opt-in until G1–G5 GOAT gate passes — the same G2 (≥ 2× on real corpus) gate that killed CompressionDrafter twice (Plan 285/287). Sigmoid, not softmax (per AGENTS.md).
analytic_lattice = []  # Analytic Lattice — k×k transport operator chain composer + ASOC trait shapes + direction-vector SIMD decoder + spectral audit (Plan 330, Research 311, fusion of Functional Attention × PJ-RoPE × Gyrocalculus). katgpt-core half: pure math primitives (compose_chain, batch_compose_chain, direction_vector_decode, spectral_audit) + generic trait shapes (PlasmaDraft, RederiveOp, ComposerCtx) — NO GpuFuture import (leaf-clean). The ComposerTick: GpuFuture impl + Join3 combinator ship in riir-engine under the `analytic_lattice_runtime` feature (Phase 1b — separate task). Opt-in until G1–G6 GOAT gate passes. Flag name renamed from `analytic_lattice_encoder` per the revision note — the original `AnalyticLatticeEncoder` trait is DROPPED (redundant with riir-engine/src/fourier/encoder.rs).
sleep_time_anticipation = ["dep:katgpt-sleep"]  # Sleep-Time Query Anticipator — open primitive for offline query anticipation (Plan 334, Research 318, arXiv:2504.13171 Lin et al. Letta/Berkeley). Substrate lives in the katgpt-sleep crate (Issue 007 Phase E Tier 2 #6); this feature turns on the re-export. SleepTimeAnticipator orchestrates per-direction sleep-time compute → emits reusable AnticipatedQuerySet (c' artifact, BLAKE3-committed) → wake-time consume() does cheap dot-product + sigmoid-gated lookup, falling through to fresh compute on low-predictability queries. PredictabilityScorer trait + DotPredictabilityScorer default (p = sigmoid(α·dot(c,dir)+β)); AmortizationCostModel operationalizes the paper's §5.3 cost model (sleep_cost + N·t·b_max·(1−E[gate])). Phase 1 ships traits + types + IdentityFunctorOp (synthetic-test default, z_i = c + dir_i). Game-specific direction-vector catalogs, NPC tiering, HLA wiring, chain commitment live in riir-ai Plan 341 (private). Opt-in until G1–G5 GOAT gate passes; promotion to default-on requires Plan 341 G1–G5 to clear on a real game corpus. Sigmoid, not softmax (per AGENTS.md).
paired_loss_diagnostic = []  # Paired Token-Level Loss Gap Diagnostic — generic modelless A/B measurement primitive (Plan 335, Research 319, arXiv:2606.20936 Li & Merrill AI2). PairedLossGap computes per-token Δ_i = ℓ_A − ℓ_B from two log-prob traces; tag-stratified means (Content/Function/Other/BracketOpen/BracketClose/CopyN); filtered aggregates (ALL_TOKENS / TOP-K∩NO-COPY / COPY-N-ONLY) that amplify small architecture gaps aggregate loss hides (paper §6 shows ~2× separation on Olmo 1B). ClassSizeBound exposes Proposition 1 (DKL(p⋆_τ ‖ p_ϕ,τ) ≤ log|V_τ|) — the volume-of-support bound justifying raw-vs-latent sync (physical small V_τ → raw sufficient; semantic large V_τ → latent earns its keep). Pure measurement tool, NOT an inference mechanism (Research 319 §3: not Super-GOAT). Generic math, no game/chain/shard semantics — legitimately public. Opt-in until G1 (synthetic fixture) + G2 (<1µs L=8192 zero-alloc) + G3 (no-regression) + G4 (filter amplifies gap ≥1.5× on micro-GPT A/B) GOAT gate passes.
temp_loss_fingerprint = []  # TEMP — Perturbed-Loss-Vector Diversity Fingerprint (Plan 341, Research 323, arXiv:2606.26797 Jin et al. ICML 2026). Modelless diversity selector: given two committed snapshots S_0, S_1, extrapolate K checkpoints along v = S_1 − S_0, compute per-candidate short-prefix loss vectors, and select the K-subset with maximal Lipschitz-bound spread — gradient-diversity ranking without gradients. Theorem 3.1 modelless reframe: similar loss vectors across K extrapolated checkpoints ⇒ similar gradients along v during the next weight-mutation cycle. Composes with ac_prefix::ConditionalLogprob, HLA surprise, RavenSlotLossKernel (riir-neuron-db Plan 005). DEFAULT-ON (Plan 341 Phase 2, 2026-06-29): G1 15.44x>=2x (MIN pairwise bound metric, Gaussian mixture fixture), G2 Kendall tau 0.9839>=0.85 at N=32 vs N=256 (paper Fig. 6 modelless analog), G3 perturbed_loss_vector 2.46us<5us + select_diverse_subset 130us<1ms + 0 allocs hot path, G4 bit-identical determinism, G5 134/134 each-feature clean. riir-neuron-db Plan 005 G2' integration gain +0.1672 (modelless). 673/673 tests pass.

manifold_bandit = []  # Manifold Bandits -- Latent Task Tree + Hierarchical Thompson Sampler + BayesianFilterArm (Plan 370, Research 370, arXiv:2606.19750 McKenzie et al. UCSD 2026). Modelless inference-time routing primitive distilled from the paper's Bayesian Manifold Curriculum (the BMC training loop -> riir-train). Three composable parts: (1) LatentTaskTree -- frozen, BLAKE3-committable hierarchical clustering of an arm space by latent similarity (Phase 1 accepts pre-built topology; Phase 3 adds PCA -> UMAP -> Chart Test -> HDBSCAN construction); (2) top-down Beta posterior Thompson descent with bottom-up EVIDENCE-pooling Empirical Bayes aggregation (parent alpha/beta = 1 + Σ(child-1) — pools observed evidence without pseudo-count dilution); (3) BayesianFilterArm -- per-arm non-stationary belief via predict-update drift filter (closes the Plan 030/032/025 contextual + non-stationary bandit gap). Composes with Dual-Pool CGSP (Plan 312, complementary non-stationarity handling) and AutocurriculumSampler (Plan 155, structure-aware upgrade). Pure modelless (closed-form Beta posteriors + deterministic Empirical Bayes, no training). DEFAULT-ON (Plan 370 Phase 2, 2026-07-03): G1 structural advantage ratio 0.723<=0.8 (hier 3615 vs flat 5000+ on 64-arm/8-cluster), G3 non-stationarity recovery ratio 0.350<=0.5 (hier+filter 184 vs flat-no-filter 525), G4 sample 408ns<500ns + observe 26ns<300ns + 0 allocs, G5 bit-reproducible. G2 diversity FAIL is a plan-level expectation error (hierarchical correctly exploits more: +10.5% reward, visits fewer clusters — diversity claim is curriculum-learning-specific, not bandit). Modelless unblock: EVIDENCE pooling replaces SUM aggregation (SUM over-concentrated parent posteriors, ratio was 0.845 FAIL; EVIDENCE pools observed evidence without pseudo-count dilution, ratio 0.723 PASS). Phase 1 Jöhnk's -> Gamma-ratio sampler swap also documented (Jöhnk's catastrophically low acceptance for large alpha/beta).
mean_field_regime = []  # Mean-Field Crowd Oscillation Regime Classifier — (κ, κ_a, Q) order-parameter aggregator + Hopf boundary detector + four-way regime taxonomy (Plan 371, Research 371, arXiv:2606.30366 Zheng/Miller/Fiete MIT Jun 2026). Three modelless primitives: (1) MeanFieldOverlap — one-pass crowd aggregation of K per-NPC HLA states into the paper's (κ, κ_a, Q) order parameters via dot-product projection onto a frozen direction vector n; (2) hopf_boundary + static_boundary + saddle_strength — closed-form 2×2 Jacobian eigenvalue check on the (κ, κ_a) planar subsystem, extending Plan 301's subspace_phase_gate from real-eigenvalue phase transitions to complex-eigenvalue (Hopf) phase transitions + spinodal-pole discriminant; (3) RegimeClassifier — combines the above + chaos intensity g into the paper's Regime enum {Static, NoiseSustainedOscillation, IrregularSwitching, GlobalLimitCycle}. DEFAULT-ON (Plan 371 Phase 6, 2026-07-03): G1 25/25 (100%) + 4/4 distinct regimes, G2 9.79us + 0ns hopf/classify, G3 710/710+682/682 clean, G4 0 allocs, G5 bit-identical. Pure modelless (closed-form f32: Jacobian eigenvalues + sigmoid gates + spinodal_margin). Fine-grid (17pt β=1.4 col): 14/17 — 3 pre-existing NSO<->IS at neg G_eff (Issue 034 T4).
factorized_action = []  # Factorized Transition Action Abstraction — modelless compositional action latent distilled from Nam et al., *Latent Actions from Factorized Transition Effects under Agent Ambiguity* (arXiv:2606.30544, Brown, 2026-06-30, Plan 375, Research 374). Frozen codebook of K D-dim effect primitives + Top-1 patch assignment + state-aware FiLM factor token + sigmoid relevance gate + normalized weighted average → compact action latent. Codebook constructed modellessly via Lloyd's k-means with k-means++ init (Path 2 of AGENTS.md §3.5 — deterministic, no gradient descent). The factorized/compositional cousin of the shipped monolithic `latent_functor` (riir-ai Plan 273): enriches the action representation from one displacement vector to a mixture of K reusable effect primitives gated by current state. Sigmoid gating throughout (NEVER softmax per AGENTS.md §2, verified in `otf_lam/model.py::GateNetwork.forward()`). Paper defaults K=128, D=32. Opt-in until G1–G6 GOAT gate (bench_375_factorized_action_goat: G1 in-distribution reconstruction MSE vs monolithic, G2 distractor-suppression + Gate-vs-Mean ablation, G3 cross-carrier transfer, G4 latency <1us zero-alloc, G5 sigmoid-never-softmax, G6 feature isolation) passes.

