[package]
name = "microgpt-rs"
version = "0.1.0"
edition = "2024"

[dependencies]
plotters = "0.3"
rayon = "1.10"
blake3 = "1"
fastrand = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
syn = { version = "2", features = ["full", "parsing"], optional = true }
proc-macro2 = { version = "1", optional = true }
toml = "0.8"

[dev-dependencies]
ratatui = "0.29"
crossterm = "0.28"

[features]
default = []
sudoku = []
validator = ["syn", "proc-macro2"]
sparse_mlp = []  # TwELL-inspired sparse MLP matmul (Plan 022)
ppot = []  # PPoT logit-parameterized CPU resampling (Plan 026 + 027)
bandit = []  # Multi-armed bandit adaptive ScreeningPruner (Plan 030)
rest = []  # REST API client via reqwest + tokio runtime (planned)
embedding_router = []  # Semantic embedding retrieval from anyrag (Plan 024)
gpu = []  # GPU compute via wgpu, safetensors model loading (planned)
leviathan = []  # LeviathanVerifier real p/q rejection sampling (Algorithm 1)
full = ["sudoku", "validator", "ppot", "bandit", "rest", "embedding_router", "gpu", "leviathan"]

[[example]]
name = "sudoku_speculative"
required-features = ["sudoku"]

[[example]]
name = "sudoku_9x9"
required-features = ["sudoku"]

