[package]
name = "microgpt-rs"
version = "0.1.0"
edition = "2024"

[dependencies]
plotters = "0.3"
rayon = "1.10"
blake3 = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
reqwest = { version = "0.12", features = ["json"], optional = true }
tokio = { version = "1", features = ["rt"], optional = true }
syn = { version = "2", features = ["full", "parsing"], optional = true }
proc-macro2 = { version = "1", optional = true }
wgpu = { version = "23", optional = true }
bytemuck = { version = "1", features = ["derive"], optional = true }
pollster = { version = "0.4", optional = true }
safetensors = { version = "0.4", optional = true }
wasmtime = { version = "28", optional = true }
wat = { version = "1", optional = true }

[dev-dependencies]
ratatui = "0.29"
crossterm = "0.28"

[features]
default = []
sudoku = []
validator = ["syn", "proc-macro2"]
rest = ["reqwest", "tokio"]
gpu = ["wgpu", "bytemuck", "pollster", "safetensors"]
wasm = ["wasmtime", "wat"]
full = ["sudoku", "validator", "rest", "gpu", "wasm"]

[[example]]
name = "sudoku_speculative"
required-features = ["sudoku"]

[[example]]
name = "sudoku_9x9"
required-features = ["sudoku"]

[[example]]
name = "sudoku_tui"
required-features = ["sudoku"]

[[example]]
name = "blue_bear"

[[example]]
name = "tactical_ai"

[[example]]
name = "blue_bear_tui"

[[example]]
name = "validator_demo"
required-features = ["validator"]
