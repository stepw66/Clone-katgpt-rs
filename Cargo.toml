[workspace]
members = ["crates/katgpt-core", "."]
resolver = "3"

[package]
name = "katgpt-rs"
version = "0.1.0"
edition = "2024"

[dependencies]
katgpt-core = { path = "crates/katgpt-core" }
plotters = "0.3"
rayon = "1.10"
log = "0.4"
blake3 = "1"
fastrand = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
syn = { version = "2", features = ["full", "parsing"], optional = true }
proc-macro2 = { version = "1", optional = true }
bevy_ecs = { version = "0.15", optional = true }  # Standalone ECS (Plan 033)
wasmtime = { version = "28", optional = true }     # WASM bomber validator (Plan 034)
papaya = { version = "0.2", optional = true }      # Lock-free concurrent HashMap (Plan 037)
ordered-float = { version = "4", optional = true } # Ord wrapper for f64 — CHT breakpoints (Plan 064 TG-A)
good_lp = { version = "1", optional = true, default-features = false, features = ["highs", "microlp"] } # MILP solver — scheduling (Plan 064 TG-D), highs primary + microlp fallback
reqwest = { version = "0.12", features = ["blocking", "json"], optional = true } # AutoGo REST API client (Plan 065)
toml = "0.8"

[dev-dependencies]
ratatui = "0.29"
crossterm = "0.28"
tempfile = "3"

[features]
default = ["sparse_mlp", "domain_latent", "ppot", "bandit", "bt_rank", "spectral_quant", "hybrid_oct_pq", "elf_sde", "cna_steering", "deep_manifold", "federation", "tes_loop", "lattice_deduction", "delta_routing", "stability_metrics", "mls_aggregate", "gdn2_attention", "dash_attn", "dreamer", "lt2_looped", "dmax_spd", "eqr_convergence", "subterranean", "sr2am_configurator", "data_gate"]  # Production best perf + accuracy (Plan 051, bt_rank Plan 079, spectral_quant Plan 063, hybrid_oct_pq Plan 101 GOAT best MSE + 64x fewer FMAs vs OCT, elf_sde Plan 079, cna_steering Plan 087 GOAT, deep_manifold Plan 085 GOAT 6/6, federation Plan 085 GOAT 6/6, tes_loop Plan 086 GOAT 8/8, lattice_deduction Plan 088 GOAT 7/7, delta_routing Plan 097 GOAT 6/6, stability_metrics Plan 102 GOAT 13/13, mls_aggregate Plan 104 GOAT 6/6, gdn2_attention Plan 105 GOAT 14/14, dash_attn Plan 106 GOAT 9/9, dreamer Plan 107 GOAT 8/8, lt2_looped Plan 108 GOAT 8/8, dmax_spd Plan 109 GOAT 7/7, eqr_convergence Plan 119, subterranean Plan 110, sr2am_configurator Plan 112, data_gate Plan 111)
sp_kv = []  # SP-KV self-pruned key-value attention (Plan 070)
tiled_attention = ["katgpt-core/tiled_attention"]  # Tiled online-softmax flash attention for CPU SIMD (Plan 115)
dash_attn = []  # DashAttention adaptive sparse hierarchical attention via α-entmax routing (Plan 106, Research 68)
mls_aggregate = []  # MLS Multi-Layer Sum aggregation of last K layer residuals (Plan 104, Research 68)
dllm = []  # D2F Discrete Diffusion Forcing — mini dLLM research (Plan 066)
dmax_spd = ["dllm"]  # DMax Soft Parallel Decode — hybrid embedding D2F enhancement (Plan 109, Research 72)
tri_mode = ["dllm"]  # Tri-Mode inference — AR + Diffusion + Self-Speculation (Plan 089, Research 55)
sudoku = []
validator = ["syn", "proc-macro2"]
sparse_mlp = ["katgpt-core/sparse_mlp"]  # TwELL-inspired sparse MLP matmul (Plan 022)
ppot = []  # PPoT logit-parameterized CPU resampling (Plan 026 + 027)
domain_latent = ["katgpt-core/domain_latent"]  # Free Transformer mid-layer domain conditioning (Plan 038)
bandit = []  # Multi-armed bandit adaptive ScreeningPruner (Plan 030)
delta_mem = ["bandit"]  # δ-Mem modelless distillation — associative bandit memory (Plan 053)
g_zero = ["bandit"]  # G-Zero self-play distillation — Hint-δ gated absorb + bandit (Plan 049)
dreamer = ["bandit"]  # Auto-Dreamer offline memory consolidation scheduler (Plan 107, Research 69)
sr2am_configurator = ["bandit", "g_zero", "katgpt-core/sr2am_configurator"]  # SR²AM Configurator Bandit — learned per-turn planning regulation (Plan 112, Research 076)
data_gate = ["katgpt-core/data_gate", "bandit"]  # Task-level data gating for self-play training stability (Plan 111, Research 075)
subterranean = ["bandit"]  # Procedure graph compilation — compiling workflows into weights (Plan 110, Research 074)
ropd_rubric = ["bandit"]  # ROPD rubric modelless distillation — multi-criteria reward (Plan 071)
tes_loop = ["bandit"]  # SimpleTES evaluation-driven scaling — RPUCG bandit + trajectory pruning (Plan 086, GOAT 8/8, default-on)
cna_steering = ["bandit"]  # CNA Contrastive Neuron Attribution — sparse MLP circuit discovery + modulation (Plan 087)
deep_manifold = []  # Deep Manifold fixed-point residual scoring (Research 51, Plan 085)
federation = ["bandit"]  # Deep Manifold federated boundary alignment — KL coupling (Research 51, Plan 085)
delta_routing = []  # Delta Block cross-layer routing (Research 061, Plan 097, GOAT 6/6, default-on)
decode_specialize = []  # Stage-specialized decode paths for speculative decoding (Plan 102)
lattice_deduction = []  # LDT Lattice Deduction Transformer — asymmetric pruning + conflict detection + α-operator (Plan 088, GOAT 7/7, default-on)
unit_distance = []  # Unit Distance GOAT proof — number-theoretic lattice constructions (Plan 090)
sdar_gate = []  # SDAR sigmoid gating for modelless distillation signals (Plan 072)
memo_reflections = ["bandit"]  # MeMo Reflection QA pipeline — 5-step compositional data synthesis (Research 60, Plan 094)
replaid_schedules = []  # RePlaid variance-minimized adaptive schedules (Plan 078) — experimental, off by default
elf_sde = []  # ELF SDE noise injection + logit-normal schedule (Plan 079) — GOAT proved: 10-22× diversity, default-on
eqr_convergence = ["elf_sde"]  # EqR convergence-based rollout selection — Top1Converged residual proxy (Plan 119, Research 79)
spec_cost_model = []  # Amdahl cost model for LeviathanVerifier (Research 59, Plan 096)
stability_metrics = []  # Per-step execution stability instrumentation — P50/P99/CV/stability_score, +0.6% overhead (Plan 102, default-on)
coda_fusion = ["katgpt-core/coda_fusion"]  # CODA-inspired fused SIMD kernels — matmul+residual+rmsnorm+activation in single-pass (Plan 103)
maxsim = ["katgpt-core/maxsim"]  # MaxSim late-interaction scoring (Research 45, Plan 080)
spectral_quant = []  # SpectralQuant calibrated eigenbasis + water-fill (Plan 077) — default-on, 9.1× compression vs TQ 5.3×, cosine 0.9917 vs TQ 0.9692 (Bench 013)
octopus = []  # OCTOPUS octahedral triplet codec — data-oblivious, dominates SQ at all bit widths: -22% to -49% MSE (Bench 022, Plan 099, default-on)
turboquant = []  # TurboQuant rotation + uniform codebook — legacy baseline for bench/educate only (Plan 063)
planar_quant = ["turboquant"]  # PlanarQuant 2D Givens rotation KV cache — O(d) vs TQ O(d²), 256 FMAs for d=128
iso_quant = ["turboquant"]  # IsoQuant 4D quaternion rotation KV cache — O(d) vs TQ O(d²), 512 FMAs for d=128
hybrid_oct_pq = ["planar_quant", "octopus"]  # Hybrid OCT encoding + PQ rotation (Plan 101)
bt_rank = []  # Bradley-Terry pairwise ranking for DDtree selection (OpenDeepThink distillation)
fft = ["bandit"]     # FFT Tactics Arena — ATB battle engine with status effects (Plan 053)
stepcode = ["bandit"]  # ⚠️ Plan 054 — NO GAIN proven. Infrastructure only. Off by default, not in `full`.
bomber = ["bevy_ecs", "bandit"]  # Bomberman HL Arena (Plan 033)
bomber-agent = ["bomber"]  # Coding agent validator loop (Issue 052, Tasks C9-C10)
bomber-wasm = ["bomber", "wasmtime", "papaya"]  # WASM bomber validator loader (Plan 034) + batch pool (Plan 037)
game_state = ["bomber"]  # GameState forward model trait + generic MCTS (Plan 056)
bandit_mcts = ["game_state"]  # Bandit-guided MCTS rollout policy — NFSP/MCTS duality (Plan 067)
hla_attention = []  # Higher-order Linear Attention — O(1) inference cache (Plan 057)
gdn2_attention = []  # Gated DeltaNet-2 recurrent attention — O(1) decode (Plan 105, Research 70)
lt2_looped = ["hla_attention"]  # LT2 looped inference pipeline — weight-shared T-pass loop (Plan 108, Research 73)
monopoly = ["bevy_ecs", "bandit"]  # Monopoly Board Game Engine (Plan 034)
go = ["bandit", "dep:reqwest"]  # AutoGo API bridge + Go GameState (Plan 065)
# ── Percepta (transformer-vm RIIR, Plan 064) ──────────────────
percepta = ["ordered-float"]  # CHT hull cache: upper+lower, HullMeta, tie-break, cumsum (TG-A)
percepta_gates = ["percepta"]  # + ReGLU, stepglu, multiply, persist primitives (TG-B)
percepta_graph = ["percepta_gates"]  # + Expression/Dimension DSL, ProgramGraph (TG-C)
percepta_wasm = ["percepta_graph"]  # + WASM decoder + lowering + interpreter — pure Rust, NOT wasmtime (TG-E+F)
percepta_compile = ["percepta_wasm", "good_lp"]  # + MILP + weights + transformer + Futamura + CLI (TG-D+G-J)
feedback = []  # E2E feedback loop — sends inference results to REST endpoint (Plan 042, requires consumer in riir-gpu)
rest = []  # REST bridge test + merge stub (Plan 009, client lives in riir-ai/riir-rest)
embedding_router = []  # Semantic embedding routing (Plan 024, not yet started)
game_domain = ["domain_latent"]  # Alias for domain_latent — game-specific Config presets (Plan 040)
language_domain = []  # Language domain: BPE vocab, LLM models (Plan 040, future)
gpu = []  # Placeholder — GPU training lives in riir-ai/riir-gpu
# LeviathanVerifier is always compiled (no gate needed) — verifier.rs, benchmark.rs
full = ["sudoku", "validator", "ppot", "domain_latent", "bandit", "delta_mem", "g_zero", "fft", "bomber", "bomber-agent", "bomber-wasm", "game_state", "bandit_mcts", "hla_attention", "gdn2_attention", "lt2_looped", "dash_attn", "mls_aggregate", "dmax_spd", "dreamer", "monopoly", "go", "feedback", "rest", "embedding_router", "gpu", "game_domain", "language_domain", "percepta_compile", "dllm", "tri_mode", "bt_rank", "spectral_quant", "octopus", "turboquant", "planar_quant", "iso_quant", "hybrid_oct_pq", "replaid_schedules", "elf_sde", "maxsim", "cna_steering", "deep_manifold", "federation", "delta_routing", "decode_specialize", "lattice_deduction", "unit_distance", "memo_reflections", "eqr_convergence", "subterranean", "sr2am_configurator", "data_gate", "coda_fusion", "tiled_attention"]

