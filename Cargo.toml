# Plan 283 Phase 4 — Self-Advantage Recursion Gate GOAT benchmark.
# G1: ≥2× forward-pass reduction. G2: ≥95% argmax match. G3: <1µs latency.
# G4: robust across vocab sizes 8..1024.
