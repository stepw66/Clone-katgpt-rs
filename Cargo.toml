[workspace]
members = ["crates/katgpt-attn", "crates/katgpt-attn-match", "crates/katgpt-core", "crates/katgpt-dec", "crates/katgpt-deprecated", "crates/katgpt-forward", "crates/katgpt-hla", "crates/katgpt-kv", "crates/katgpt-micro-belief", "crates/katgpt-percepta", "crates/katgpt-personality", "crates/katgpt-pruners", "crates/katgpt-quant", "crates/katgpt-sense", "crates/katgpt-sleep", "crates/katgpt-spectral", "crates/katgpt-speculative", "crates/katgpt-tokenizer", "crates/katgpt-transformer", "crates/katgpt-types", "."]
resolver = "3"

[package]
name = "katgpt-rs"
version = "0.2.0"
edition = "2024"
publish = false  # dev/examples aggregator — never published. Only katgpt-core ships to crates.io.

[dependencies]
katgpt-core = { path = "crates/katgpt-core" }
katgpt-transformer = { path = "crates/katgpt-transformer" }
# katgpt-forward (Issue 007 Phase F, 2026-07-02): the top-tier crate hosting
# `ForwardContext` — the composition-layer join point that sits ABOVE both
# katgpt-transformer (buffer types + WallPrefixState) and katgpt-pruners
# (CnaModulator/SubstrateMask/HydraSkipPlan). Neither leaf could host it
# without a cycle. Root re-exports `ForwardContext` from `crate::transformer`
# so every historical call site resolves unchanged. Non-optional — the 33
# root forward-pass functions access ctx.<field> directly.
katgpt-forward = { path = "crates/katgpt-forward", default-features = false }
# katgpt-deprecated (Proposal 003 Phase 3a, 2026-07-01): the loser crate.
# Exiled primitives (dead stubs, GOAT-failed, off-topic). Never default-on.
katgpt-deprecated = { path = "crates/katgpt-deprecated" }
# katgpt-pruners (Plan 005, 2026-06-29): extracted from src/pruners/ (minus bomber).
# Non-optional — root re-exports the pruners surface from `crate::pruners::*` via
# the back-compat shim in src/pruners/mod.rs (`pub use katgpt_pruners::*`).
# Default features mirror the historical root default-on pruner surface.
katgpt-pruners = { path = "crates/katgpt-pruners", default-features = false }
# katgpt-speculative (Issue 013): shared DDTree + speculative decoding substrate.
# Currently consumed via the re-export at `katgpt_speculative::dd_tree::*` from
# downstream riir-engine. The root `src/speculative/dd_tree.rs` core functions
# have drifted (see TODO in that file) and are NOT yet re-exported from here —
# the divergence is tracked for a follow-up convergence pass.
katgpt-speculative = { path = "crates/katgpt-speculative" }
# katgpt-attn-match (Issue 359): extracted Attention Matching KV compaction substrate.
# Non-optional — `attn_match` is DEFAULT-ON (Plan 271 GOAT 9/9) and the root re-exports
# the leaf as `pub use katgpt_attn_match as attn_match;`. The `adaptive_cot` glue
# (composes root-only `freq_bandit`) stays in root at `src/attn_match_adaptive_cot.rs`.
katgpt-attn-match = { path = "crates/katgpt-attn-match" }
# katgpt-quant (Proposal 003 Phase 1, 2026-07-01): extracted quantization codecs
# (turboquant, planar_quant, iso_quant, octopus, hybrid_oct_pq). Non-optional path dep;
# each codec is opt-in via its feature flag. The root re-exports each module behind its
# historical feature so `katgpt_rs::turboquant::*` / `katgpt_rs::octopus::*` / etc.
# continue to resolve.
katgpt-quant = { path = "crates/katgpt-quant" }
# katgpt-attn (Proposal 003 Phase 2, 2026-07-01): extracted attention stack
# primitives (gdn2 kernel+types, dash_attn clean core, chiaroscuro, rat_bridge,
# ega_attn, diagonal_gate, static_cal, funcattn_compose). Non-optional path dep;
# each module is opt-in via its feature flag. The root re-exports each module
# behind its historical feature so `katgpt_rs::gdn2::*` / `katgpt_rs::chiaroscuro::*`
# / etc. continue to resolve. Forward glue + VortexFlow cluster stay in root.
katgpt-attn = { path = "crates/katgpt-attn" }
plotters = { version = "0.3", optional = true }  # Issue 355 Phase 2a: optional — gated behind `plot` feature. Only `src/plot.rs` + `src/main.rs` benchmark runner use it. Default-on (in `default` array) to preserve historical behavior; riir-ai consumers set `default-features = false` to drop it.
rayon = "1.10"
log = "0.4"
blake3 = "1"
uuid = { version = "1", features = ["v7"] }  # Uuid::now_v7() for per-entity provenance ids (Issue 001 HLA eigenbasis)
fastrand = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
postcard = { version = "1", features = ["alloc"] }
syn = { version = "2", features = ["full", "parsing"], optional = true }
proc-macro2 = { version = "1", optional = true }
bevy_ecs = { version = "0.15", optional = true }  # Standalone ECS (Plan 033)
wasmi = { version = "1.0", optional = true }       # WASM bomber validator (Plan 034, wasmi migration Plan 167)
papaya = { version = "0.2", optional = true }      # Lock-free concurrent HashMap (Plan 037)
# katgpt-tokenizer (Issue 014): extracted to standalone crate. Non-optional — the
# BPE substrate is always compiled, matching pre-extraction `pub mod tokenizer`
# being unconditional. `good_lp` moved into katgpt-tokenizer (gated by convex_tok).
katgpt-tokenizer = { path = "crates/katgpt-tokenizer" }
# katgpt-percepta (Plan 064): extracted to standalone crate. Non-optional — legacy module
# (KVCache2D, Sudoku9x9, StreamingSolver) is zero-dep and always compiled, matching the
# pre-extraction behavior where `pub mod percepta` was unconditional. Feature ladder gates
# only the advanced parts (CHT, gates, graph, wasm, compile).
katgpt-percepta = { path = "crates/katgpt-percepta" }
# katgpt-spectral (Issue 015 Phase 2): extracted spectral quantization substrate.
# Non-optional — `spectralquant` is `default = ["spectral_quant"]`-historically-on
# and has non-KV consumers (funcattn_compose, chiaroscuro, benchmark). The root
# crate re-exports it as `katgpt_rs::spectralquant` for back-compat.
katgpt-spectral = { path = "crates/katgpt-spectral" }
# katgpt-kv (Issue 015 Phase 3): extracted KV-cache namespace. Non-optional — the
# root re-exports each sub-module behind its historical feature flag
# (`kv_share`, `osc_kv`, `cs_kv_probe`, `shard_kv`, `sp_kv`, `still_kv`, `kvarn`,
# `targeted_precision`). All flags remain default-off-or-on as before.
katgpt-kv = { path = "crates/katgpt-kv" }
reqwest = { version = "0.12", features = ["blocking", "json"], optional = true } # AutoGo REST API client (Plan 065)
toml = "0.8"
bytemuck = { version = "1", features = ["extern_crate_alloc"] }  # extern_crate_alloc: enables pod_collect_to_vec (used by transformer.rs weight loading). On native this is unified transitively via plotters→image, but wasm32 builds skip plotters so the feature must be explicit. See Plan 316.
half = "2"  # f16 compact KV cache storage (Plan 245 StillKV)
rustfft = { version = "6", optional = true }  # CHIAR per-token DCT entropy (Plan 269)

[target.'cfg(target_arch = "wasm32")'.dependencies]
# getrandom wasm32 backends — required so that transitive consumers (bevy_ecs
# → bevy_utils → ahash pulls BOTH getrandom 0.2 and 0.3) compile for the
# browser / CF Worker / wasmtime wasm32-unknown-unknown targets. Without
# these, `secure_vessel` / `bomber-wasm` / `bomber` fail with getrandom's
# "wasm32-unknown-unknown targets are not supported by default" error.
# getrandom 0.3 renamed the feature: `js` (0.2) → `wasm_js` (0.3).
# See https://docs.rs/getrandom/#webassembly-support
getrandom = { version = "0.3", features = ["wasm_js"] }
getrandom_02 = { package = "getrandom", version = "0.2", features = ["js"] }

[target.'cfg(target_os = "macos")'.dependencies]
coreml-native = { version = "0.2", optional = true }  # Apple Neural Engine inference backend (Plan 176)
coreml-proto = { version = "0.1", optional = true }  # CoreML protobuf spec builder for runtime compilation (Plan 176)
prost = { version = "0.14", optional = true }  # Protobuf serialization for CoreML spec (Plan 176)
metal = { version = "0.33", optional = true }  # GPU inference backend via Metal compute (Plan 176)

[dev-dependencies]
ratatui = "0.29"
crossterm = "0.28"
tempfile = "3"

